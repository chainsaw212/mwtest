        let h = 0; selDates.forEach(k => { if (r[k] !== undefined) h += r[k]; });
        const base = h * settings.wage;
        const { weeks, bonus } = calcBonus(selDates, r, settings.bonusAmt || 0);
        return { h, base, weeks, bonus, total: base + bonus };
      };
      const result = calcResult();

      /** 정산 완료 → KV settled 업데이트 */
      const doSettle = async () => {
        if (!settleKeyStr) return;
        setLoading(true);
        const ns = { ...settled, [settleKeyStr]: [...selDates].sort() };
        await saveSettledKV(ns); setSettled(ns);
        showToast("✅ 정산 완료!"); setLoading(false);
      };

      return (
        <Screen>
          <Toast msg={toast} />
          <AppBar title="정산 관리" session={session} onSettings={onSettings} />

          {/* 급여 설정 */}
          <div style={{ margin: "14px 14px 0", background: T.surface, borderRadius: 18, border: `1px solid ${T.border}`, padding: "16px 18px" }}>
            <p style={{ margin: "0 0 12px", fontWeight: 800, fontSize: 15, color: T.text }}>⚙️ 급여 설정</p>
            <div style={{ display: "flex", gap: 10, marginBottom: 10 }}>
              <div style={{ flex: 1 }}>
                <label style={{ fontSize: 13, color: T.sub, fontWeight: 700, display: "block", marginBottom: 5 }}>시급 (원)</label>
                <input type="number" value={wageIn} onChange={e => setWageIn(e.target.value)} style={{ width: "100%", boxSizing: "border-box", background: T.bg, border: `1px solid ${T.border}`, borderRadius: 12, padding: "11px 12px", color: T.text, fontSize: 18, fontWeight: 800, fontFamily: T.font, outline: "none" }} />
                <p style={{ margin: "6px 0 0", fontSize: 12, color: T.muted, lineHeight: 1.5 }}>주휴수당 = 주 근무시간 ÷ 5 × 시급<br />(주 15h 이상 · 완성된 주만 적용)</p>
              </div>
              <div style={{ flex: 1 }}>
                <label style={{ fontSize: 13, color: T.sub, fontWeight: 700, display: "block", marginBottom: 5 }}>주휴수당 (원)</label>
                <input type="number" value={bonusIn} onChange={e => setBonusIn(e.target.value)} style={{ width: "100%", boxSizing: "border-box", background: T.bg, border: `1px solid ${T.border}`, borderRadius: 12, padding: "11px 12px", color: T.text, fontSize: 18, fontWeight: 800, fontFamily: T.font, outline: "none" }} />
              </div>
            </div>
            <DarkBtn onClick={saveSettings}>{loading ? "저장 중..." : "💾 저장"}</DarkBtn>
          </div>

          {/* 직원 선택 */}
          <div style={{ padding: "16px 14px 0" }}>
            <p style={{ fontWeight: 800, fontSize: 15, marginBottom: 10 }}>직원 선택</p>
            <div style={{ display: "flex", flexWrap: "wrap", gap: 8, marginBottom: 16 }}>
              {staffList.map(u => (
                <button key={u.id} onClick={() => { setSSaff(u.id); setSelDates([]); }} style={{ padding: "9px 16px", borderRadius: 100, border: sSaff === u.id ? `2px solid ${(C[u.id] || { accent: "#888" }).accent}` : `1px solid ${T.border}`, background: sSaff === u.id ? (C[u.id] || { light: "#f5f5f5" }).light : T.surface, color: sSaff === u.id ? (C[u.id] || { accent: "#888" }).accent : T.text, cursor: "pointer", fontWeight: 700, fontSize: 13, fontFamily: T.font, display: "flex", alignItems: "center", gap: 6, transition: "all 0.18s" }}>
                  <span>{(C[u.id] || { icon: "👤" }).icon}</span>{u.name}
                </button>
              ))}
            </div>
            <p style={{ fontWeight: 800, fontSize: 15, marginBottom: 10 }}>기간 선택</p>
            <div style={{ display: "flex", gap: 8, marginBottom: 14 }}>
              {[{ id: "week", l: "📅 1주일" }, { id: "month", l: "📆 한달" }, { id: "custom", l: "✏️ 직접" }].map(mm => (
                <button key={mm.id} onClick={() => { setSMode(mm.id); setSelDates([]); }} style={{ flex: 1, padding: "12px 4px", borderRadius: 14, border: sMode === mm.id ? `2px solid ${T.btn}` : `1px solid ${T.border}`, background: sMode === mm.id ? T.btn : T.surface, color: sMode === mm.id ? T.btnTxt : T.sub, fontWeight: 700, fontSize: 13, cursor: "pointer", fontFamily: T.font, transition: "all 0.18s" }}>{mm.l}</button>
              ))}
            </div>
          </div>

          {sSaff && sMode && (
            <div style={{ padding: "0 14px" }}>
              {sMode === "week" && <p style={{ fontSize: 13, color: T.sub, background: T.surface, padding: "9px 14px", borderRadius: 12, border: `1px solid ${T.border}`, marginBottom: 8 }}>📌 월요일만 클릭 — 월~일 자동 선택 · 재클릭 취소</p>}
              {sMode === "month" && <p style={{ fontSize: 13, color: T.sub, background: T.surface, padding: "9px 14px", borderRadius: 12, border: `1px solid ${T.border}`, marginBottom: 8 }}>📌 1일만 클릭 — 해당 월 전체 선택 · 재클릭 취소</p>}
              {sMode === "custom" && <p style={{ fontSize: 13, color: T.sub, background: T.surface, padding: "9px 14px", borderRadius: 12, border: `1px solid ${T.border}`, marginBottom: 8 }}>📌 시작일 → 종료일 클릭으로 범위 선택 · 재클릭 취소</p>}
            </div>
          )}

          {/* 정산 달력 — 항상 표시 */}
          <div style={{ padding: "0 14px" }}>
            <MonthNav view={view} prev={prev} next={next} />
            <div style={{ display: "grid", gridTemplateColumns: "repeat(7,1fr)", marginBottom: 3 }}>
              {WD.map((d, i) => <div key={d} style={{ textAlign: "center", fontSize: 16, fontWeight: 700, padding: "4px 0", color: i === 5 ? T.sat : i === 6 ? T.sun : T.sub }}>{d}</div>)}
            </div>
            <div style={{ display: "grid", gridTemplateColumns: "repeat(7,1fr)", gap: 2, userSelect: "none" }}>
              {grid.map((cell, i) => {
                const k = dkey(cell.y, cell.m, cell.d);
                const dow = mdow(cell.y, cell.m, cell.d);
                const isMon = dow === 0, isFirst = cell.d === 1 && !cell.ov;
                const noMode = !sSaff || !sMode;
                const disabled = noMode || (sMode === "week" && !isMon) || (sMode === "month" && !isFirst);
                const isSel = selDates.includes(k);
                const staffH = sSaff ? (allRecs[sSaff] || {})[k] : undefined;
                const isToday = k === todayK;
                const isSat = dow === 5, isSun = dow === 6;
                const sk = sSaff && selDates.length > 0 ? `${sSaff}_${[...selDates].sort()[0]}` : "";
                const thisSettled = isSel && selDates.length > 0 && Array.isArray(settled[sk]) && settled[sk].includes(k);
                const staffsOnDay = !sSaff ? Object.entries(allRecs).filter(([, r]) => r[k] !== undefined).map(([id]) => id) : [];
                const isCarryDay = sSaff && mgrCarry.carryH > 0 && k === mgrCarry.lastDayKey && !cell.ov;
                return (
                  <div key={i} onClick={() => { if (!disabled) clickDay(k); }} style={{ height: 80, borderRadius: 10, border: isSel && sCol ? `2px solid ${sCol.accent}` : isCarryDay ? "2px solid #F59E0B" : isToday ? `1.5px solid ${T.btn}88` : `1px solid ${T.border}`, background: isSel && sCol ? sCol.light : isCarryDay ? "#FFF8E7" : cell.ov ? "#F5F0E8" : T.surface, cursor: disabled ? "default" : "pointer", opacity: cell.ov ? 0.45 : 1, display: "flex", flexDirection: "column", alignItems: "center", padding: "5px 1px 4px", gap: 1, transition: "all 0.12s", overflow: "hidden" }}>
                    <span style={{ fontSize: 16, fontWeight: isToday ? 900 : 600, lineHeight: 1.1, color: isSun ? T.sun : isSat ? T.sat : cell.ov ? T.muted : T.text }}>{cell.d}</span>
                    {sSaff && staffH !== undefined && <span style={{ fontSize: 18, fontWeight: 900, color: isSel && sCol ? sCol.accent : T.sub, lineHeight: 1 }}>{staffH}h</span>}
                    {thisSettled && <span style={{ fontSize: 8, background: "#15803D", color: "#fff", borderRadius: 3, padding: "1px 3px", fontWeight: 700 }}>✓정산</span>}
                    {isCarryDay && <span style={{ fontSize: 8, background: "#F59E0B", color: "#fff", borderRadius: 3, padding: "1px 3px", fontWeight: 700, lineHeight: 1.2 }}>이월 {mgrCarry.carryH.toFixed(1)}h</span>}
                    {!sSaff && (
                      <div style={{ display: "flex", flexDirection: "column", gap: 1, width: "100%", padding: "0 2px" }}>
                        {staffsOnDay.slice(0, 3).map(id => (
                          <div key={id} style={{ background: C[id]?.light || "#f5f5f5", borderLeft: `2px solid ${C[id]?.accent || "#888"}`, borderRadius: 3, padding: "1px 2px", display: "flex", alignItems: "center", gap: 1 }}>
                            <span style={{ fontSize: 14, lineHeight: 1 }}>{C[id]?.icon || "👤"}</span>
                            <span style={{ fontSize: 14, fontWeight: 800, color: C[id]?.accent || "#888", lineHeight: 1 }}>{allRecs[id][k]}h</span>
                          </div>
                        ))}
                      </div>
                    )}
                  </div>
                );
              })}
            </div>

            {/* 이월 카드 */}
            {sSaff && mgrCarry.carryH > 0 && (
              <div style={{ marginTop: 10, background: "#FFF8E7", borderRadius: 12, border: "1px solid #FFD980", padding: "10px 14px", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                <div>
                  <span style={{ fontSize: 14, fontWeight: 700, color: "#B45309" }}>주휴 이월 →</span>
                  <span style={{ fontSize: 12, color: "#B45309", marginLeft: 6 }}>다음달 정산에 포함</span>
                </div>
                <span style={{ fontSize: 15, fontWeight: 800, color: "#B45309" }}>{mgrCarry.carryH.toFixed(1)}h</span>
              </div>
            )}

            {sSaff && sMode && selDates.length > 0 && (
              <div style={{ marginTop: 8, padding: "9px 14px", background: T.surface, borderRadius: 12, border: `1px solid ${T.border}` }}>
                <p style={{ margin: 0, fontSize: 14, color: T.sub }}>선택 {selDates.length}일 · {selDates[0].replace(/-/g, ".")} ~ {selDates[selDates.length - 1].replace(/-/g, ".")}</p>
              </div>
            )}

            {/* 정산 결과 카드 */}
            {result && selDates.length > 0 && sCol && (
              <div style={{ marginTop: 12, background: T.surface, border: `1px solid ${T.border}`, borderRadius: 20, padding: 20 }}>
                <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 16 }}>
                  <div style={{ width: 44, height: 44, borderRadius: "50%", background: sCol.light, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 22 }}>{sCol.icon}</div>
                  <div>
                    <p style={{ margin: 0, fontWeight: 800, fontSize: 15 }}>{sUser?.name}</p>
                    <p style={{ margin: 0, fontSize: 14, color: T.sub }}>{selDates.length}일 · {result.h.toFixed(1)}시간</p>
                  </div>
                </div>
                {[
                  { l: "총 근무시간", v: `${result.h.toFixed(1)}시간` },
                  { l: "기본급", v: `${comma(result.base)}원` },
                ].map(row => (
                  <div key={row.l} style={{ display: "flex", justifyContent: "space-between", marginBottom: 9 }}>
                    <span style={{ color: T.sub, fontSize: 14 }}>{row.l}</span>
                    <span style={{ fontWeight: 700 }}>{row.v}</span>
                  </div>
                ))}
                {/* 주휴수당 포함/제외 토글 */}
                <div style={{ marginBottom: 12 }}>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>
                    <span style={{ color: T.sub, fontSize: 14 }}>주휴수당</span>
                    <span style={{ fontWeight: 700, color: result.weeks > 0 && !excludeBonus ? "#15803D" : T.muted, fontSize: 13 }}>
                      {result.weeks > 0 ? (excludeBonus ? <span style={{ textDecoration: "line-through", color: T.muted }}>+{comma(result.bonus)}원</span> : `${result.weeks}주 × +${comma(result.bonus / Math.max(result.weeks, 1))}원 = +${comma(result.bonus)}원`) : "해당없음 (주 15h 미만)"}
                    </span>
                  </div>
                  {result.weeks > 0 && (
                    <div style={{ display: "flex", justifyContent: "flex-end" }}>
                      <div style={{ display: "inline-flex", borderRadius: 100, overflow: "hidden", border: `1.5px solid ${T.border}`, background: T.bg }}>
                        <button onClick={() => setExcludeBonus(false)} style={{ padding: "7px 18px", border: "none", borderRadius: 100, background: !excludeBonus ? "#15803D" : "transparent", color: !excludeBonus ? "#fff" : T.sub, fontWeight: 700, fontSize: 13, cursor: "pointer", fontFamily: T.font, transition: "all 0.18s" }}>포함</button>
                        <button onClick={() => { if (!excludeBonus) setShowBonusConfirm(true); }} style={{ padding: "7px 18px", border: "none", borderRadius: 100, background: excludeBonus ? "#B91C1C" : "transparent", color: excludeBonus ? "#fff" : T.sub, fontWeight: 700, fontSize: 13, cursor: "pointer", fontFamily: T.font, transition: "all 0.18s" }}>제외</button>
                      </div>
                    </div>
                  )}
                </div>
                <div style={{ height: 1, background: T.border, margin: "12px 0" }} />
                <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 18 }}>
                  <span style={{ fontWeight: 800, fontSize: 16 }}>합계</span>
                  <span style={{ fontWeight: 900, fontSize: 26, color: sCol.accent }}>{comma(excludeBonus ? result.base : result.total)}원</span>
                </div>
                {isAlreadySettled
                  ? <div style={{ textAlign: "center", padding: 14, background: "#F0FDF4", borderRadius: 14, border: "1px solid #BBF7D0" }}><span style={{ color: "#15803D", fontWeight: 800 }}>✅ 정산 완료</span></div>
                  : <DarkBtn onClick={doSettle}>{loading ? "정산 중..." : "💰 정산하기"}</DarkBtn>
                }
              </div>
            )}

            {/* 주휴수당 제외 확인 팝업 */}
            {showBonusConfirm && result && (
              <div style={{ position: "fixed", inset: 0, background: "rgba(28,25,23,0.5)", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 500, backdropFilter: "blur(4px)", padding: "0 32px" }}>
                <div style={{ background: T.surface, borderRadius: 24, padding: "28px 24px", width: "100%", maxWidth: 340, boxShadow: "0 8px 40px rgba(0,0,0,0.2)" }}>
                  <div style={{ textAlign: "center", marginBottom: 20 }}>
                    <div style={{ fontSize: 40, marginBottom: 12 }}>⚠️</div>
                    <p style={{ margin: 0, fontWeight: 900, fontSize: 17, color: T.text }}>주휴수당을 제외하시겠습니까?</p>
                    <p style={{ margin: "10px 0 0", fontSize: 14, color: T.sub, lineHeight: 1.6 }}>제외하면 합계에서<br /><strong style={{ color: "#B91C1C" }}>+{comma(result.bonus)}원</strong>이 빠집니다</p>
                  </div>
                  <div style={{ display: "flex", gap: 10 }}>
                    <button onClick={() => setShowBonusConfirm(false)} style={{ flex: 1, padding: "14px", borderRadius: 100, border: `1.5px solid ${T.border}`, background: T.bg, color: T.text, fontWeight: 700, fontSize: 15, cursor: "pointer", fontFamily: T.font }}>취소</button>
                    <button onClick={() => { setExcludeBonus(true); setShowBonusConfirm(false); }} style={{ flex: 1, padding: "14px", borderRadius: 100, border: "none", background: "#B91C1C", color: "#fff", fontWeight: 700, fontSize: 15, cursor: "pointer", fontFamily: T.font, boxShadow: "0 2px 8px rgba(185,28,28,0.35)" }}>제외</button>
                  </div>
                </div>
              </div>
            )}
            <div style={{ height: 20 }} />
          </div>

          {(!sSaff || !sMode) && (
            <div style={{ textAlign: "center", padding: "28px 20px 0", color: T.sub }}>
              <p style={{ fontSize: 14, fontWeight: 600 }}>{!sSaff ? "👆 직원을 선택하면 달력에 근무가 표시됩니다" : !sMode ? "👆 기간 방식을 선택하면 날짜를 고를 수 있어요" : ""}</p>
            </div>
          )}
        </Screen>
      );
    }

    // ══════════════════════════════════════════════════════════
    // ██  앱 루트  ██
    // ══════════════════════════════════════════════════════════
    function App() {
      const [session, setSession] = useState(null);
      const [tab, setTab] = useState("home");
      const [ready, setReady] = useState(false);
      const [refresh, setRefresh] = useState(0);
      const [tabKey, setTabKey] = useState(0);
      const [settingsOpen, setSettingsOpen] = useState(false);

      useEffect(() => {
        // 로컬스토리지에서 로그인 유지 정보 복원
        // "saved" 키는 서버에 올라가지 않고 이 기기에만 저장됩니다.
        const s = LS.get("saved");
        if (s) {
          if (s.mode === "manager") {
            setSession({ id: "00", name: "매니저", mode: "manager" });
          } else {
            // KV에서 최신 직원 목록을 가져와서 세션 복원
            getStaff().then(list => {
              const u = list.find(x => x.id === s.id);
              if (u) {
                if (C[u.id] && u.icon) C[u.id].icon = u.icon;
                setSession({ ...u, mode: "staff" });
              }
              setReady(true);
            });
            return; // setReady는 위 then에서 처리
          }
        }
        setReady(true);
      }, []);

      const handleRefresh = () => setTabKey(k => k + 1);
      const openSettings = () => setSettingsOpen(true);
      const closeSettings = () => { setSettingsOpen(false); setTabKey(k => k + 1); };

      if (!ready) return (
        <div style={{ minHeight: "100vh", background: T.bg, display: "flex", alignItems: "center", justifyContent: "center", fontFamily: T.font }}>
          <div style={{ fontSize: 48 }}>⏱️</div>
        </div>
      );

      return (
        <div style={{ fontFamily: T.font, maxWidth: 480, margin: "0 auto", position: "relative" }}>
          {tab === "home" && <HomeTab key={tabKey} session={session} setSession={setSession} onSettings={openSettings} />}
          {tab === "cal" && <CalTab key={tabKey} session={session} refresh={refresh} setRefresh={setRefresh} onSettings={openSettings} />}
          {tab === "settle" && <SettleTab key={tabKey} session={session} refresh={refresh} onSettings={openSettings} />}
          <BottomTabs tab={tab} setTab={setTab} onRefresh={handleRefresh} session={session} />
          {settingsOpen && session && (
            <SettingsOverlay session={session} setSession={setSession} onClose={closeSettings} />
          )}
        </div>
      );
    }

    // DOM 마운트
    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
