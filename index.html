<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="default"/>
  <meta name="theme-color" content="#FAF7F2"/>
  <title>근무 기록부</title>

  <!--
  ════════════════════════════════════════════════════════════════
  외부 라이브러리 (CDN — 인터넷 연결 필요)
  - React 18      : UI 렌더링
  - ReactDOM 18   : DOM 마운트
  - Babel         : 브라우저에서 JSX → JS 변환 (빌드 단계 없음)
  ════════════════════════════════════════════════════════════════
  -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    /* 전역 리셋 & 폰트 */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: #EDE8E1; }
    body { font-family: 'Apple SD Gothic Neo', 'Pretendard', 'Noto Sans KR', sans-serif; }
    #root { min-height: 100vh; }
    /* 넘버 인풋 화살표 숨김 */
    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; }
    input[type=number] { -moz-appearance: textfield; }
    /* iOS 버튼 기본 스타일 제거 */
    button { -webkit-tap-highlight-color: transparent; }
  </style>
</head>
<body>
  <div id="root"></div>

  <!--
  ════════════════════════════════════════════════════════════════
  ██  데이터 저장 전략  ██

  [ 로컬스토리지 — 이 기기에만 저장 ]
    - "saved"  : 로그인 유지 정보 { mode, id }
                 기기마다 독립적이어야 하므로 서버에 올리지 않음

  [ Cloudflare KV — 서버에 저장 · 모든 기기 공유 ]
    - "staff_list"   : 직원 목록 배열 (이름/ID/PIN/아이콘)
    - "mgr_pin"      : 매니저 비밀번호 (평문)
    - "settings"     : 시급·주휴수당 설정 { wage, bonusAmt }
    - "rec_{id}"     : 직원별 근무 기록 { "YYYY-MM-DD": 시간수 }
                       예) rec_01, rec_02, ...
    - "settled"      : 정산 완료 기록 { "id_YYYY-MM-DD": [날짜배열] }

  [ KV API 엔드포인트 ]
    Cloudflare Worker가 아래 경로를 제공해야 합니다.
    담당자는 하단 CLOUDFLARE_SETUP.md 를 참조하세요.

    GET  /api/kv?key=KEY           → { value: ... }   (없으면 404)
    POST /api/kv                   → body: { key, value }   → { ok: true }

  [ WORKER_URL 설정 ]
    아래 KV 섹션에서 WORKER_URL 을 실제 Worker 주소로 변경하세요.
    예) https://work-record-worker.my-subdomain.workers.dev
  ════════════════════════════════════════════════════════════════
  -->

  <script type="text/babel">
    const { useState, useRef, useEffect, useCallback } = React;

    // ══════════════════════════════════════════════════════════
    // ██  KV API 설정  ██
    // ══════════════════════════════════════════════════════════

    /**
     * ⚠️ 아래 URL을 실제 Cloudflare Worker URL로 변경하세요.
     * Cloudflare Pages로 리디렉션 후에는 같은 도메인의 /api/* 경로를 사용하거나
     * Worker URL을 직접 입력합니다.
     *
     * 예) "https://work-record-api.example.workers.dev"
     *     또는 Cloudflare Pages + Worker 통합 시 "/api" (상대경로)
     */
    const WORKER_URL = "https://YOUR_WORKER_URL_HERE"; // ← 여기를 변경하세요

    /**
     * KV 헬퍼 — Cloudflare Worker API를 통해 KV에 읽기/쓰기
     *
     * get(key, default)  : KV에서 값을 읽어옴. 없으면 default 반환.
     * set(key, value)    : KV에 값을 씀. value는 JSON 직렬화됨.
     *
     * ※ 실패 시 콘솔 에러를 출력하고 default를 반환합니다.
     *   네트워크 오류가 반복되면 Worker URL을 확인하세요.
     */
    const KV = {
      get: async (key, def = null) => {
        try {
          const res = await fetch(`${WORKER_URL}/api/kv?key=${encodeURIComponent(key)}`);
          if (res.status === 404) return def;
          if (!res.ok) throw new Error(`KV GET failed: ${res.status}`);
          const data = await res.json();
          return data.value !== undefined ? data.value : def;
        } catch (e) {
          console.error("[KV.get]", key, e);
          return def;
        }
      },
      set: async (key, value) => {
        try {
          const res = await fetch(`${WORKER_URL}/api/kv`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ key, value }),
          });
          if (!res.ok) throw new Error(`KV SET failed: ${res.status}`);
          return true;
        } catch (e) {
          console.error("[KV.set]", key, e);
          return false;
        }
      },
    };

    /**
     * 로컬스토리지 헬퍼 — "saved" (로그인 유지) 전용
     * KV 연동 전 임시 캐시로도 활용됩니다.
     */
    const LS = {
      get: (k, d = null) => {
        try { const v = localStorage.getItem(k); return v ? JSON.parse(v) : d; } catch { return d; }
      },
      set: (k, v) => { try { localStorage.setItem(k, JSON.stringify(v)); } catch {} },
      del: (k) => { try { localStorage.removeItem(k); } catch {} },
    };

    // ══════════════════════════════════════════════════════════
    // ██  기본 데이터 (최초 KV 미설정 시 폴백)  ██
    // ══════════════════════════════════════════════════════════

    /** 초기 직원 목록 — KV에 staff_list가 없을 때 사용 */
    const DEFAULT_STAFF = [
      { id: "01", pin: "1111", name: "한소희" },
      { id: "02", pin: "2222", name: "고윤정" },
      { id: "03", pin: "3333", name: "신예은" },
    ];
    const DEFAULT_MGR_PIN = "0000";

    /** 직원별 색상·아이콘 매핑 (런타임 변경 가능) */
    const C = {
      "01": { accent: "#B91C1C", light: "#FEF2F2", icon: "🐱" },
      "02": { accent: "#1D6A8A", light: "#EFF8FF", icon: "🐶" },
      "03": { accent: "#15803D", light: "#F0FDF4", icon: "🐰" },
      "04": { accent: "#B45309", light: "#FFFBEB", icon: "🦊" },
      "05": { accent: "#6D28D9", light: "#F5F3FF", icon: "🐨" },
    };

    const WD = ["월", "화", "수", "목", "금", "토", "일"];
    const MN = ["1월","2월","3월","4월","5월","6월","7월","8월","9월","10월","11월","12월"];

    /** 디자인 토큰 — 크림 테마 */
    const T = {
      bg: "#EDE8E1", surface: "#FAF7F2", card: "#FFFFFF",
      border: "#DDD6CC", text: "#1C1917", sub: "#78716C", muted: "#A8A29E",
      btn: "#1C1917", btnTxt: "#FAF7F2",
      sat: "#1D6A8A", sun: "#B91C1C",
      font: "'Apple SD Gothic Neo','Pretendard','Noto Sans KR',sans-serif",
    };

    // ══════════════════════════════════════════════════════════
    // ██  KV 래퍼 함수  ██
    // 앱 전체에서 직접 KV.get/set 대신 아래 함수들을 사용합니다.
    // ══════════════════════════════════════════════════════════

    /** KV: 직원 목록 읽기 */
    async function getStaff() {
      return await KV.get("staff_list", DEFAULT_STAFF);
    }
    /** KV: 직원 목록 저장 */
    async function saveStaff(list) {
      await KV.set("staff_list", list);
    }
    /** KV: 매니저 PIN 읽기 */
    async function getMgrPin() {
      return await KV.get("mgr_pin", DEFAULT_MGR_PIN);
    }
    /** KV: 매니저 PIN 저장 */
    async function saveMgrPin(pin) {
      await KV.set("mgr_pin", pin);
    }
    /** KV: 직원 근무 기록 읽기 */
    async function getRecs(staffId) {
      return await KV.get(`rec_${staffId}`, {});
    }
    /** KV: 직원 근무 기록 저장 */
    async function saveRecs(staffId, recs) {
      await KV.set(`rec_${staffId}`, recs);
    }
    /** KV: 시급·주휴수당 설정 읽기 */
    async function getSettings() {
      return await KV.get("settings", { wage: 10030, bonusAmt: 10030 });
    }
    /** KV: 시급·주휴수당 설정 저장 */
    async function saveSettingsKV(s) {
      await KV.set("settings", s);
    }
    /** KV: 정산 완료 기록 읽기 */
    async function getSettled() {
      return await KV.get("settled", {});
    }
    /** KV: 정산 완료 기록 저장 */
    async function saveSettledKV(s) {
      await KV.set("settled", s);
    }

    // ══════════════════════════════════════════════════════════
    // ██  날짜 유틸  ██
    // ══════════════════════════════════════════════════════════

    function dkey(y, m, d) {
      return `${y}-${String(m + 1).padStart(2, "0")}-${String(d).padStart(2, "0")}`;
    }
    function daysIn(y, m) { return new Date(y, m + 1, 0).getDate(); }
    function moff(y, m) { const w = new Date(y, m, 1).getDay(); return (w + 6) % 7; }
    function mdow(y, m, d) { const w = new Date(y, m, d).getDay(); return (w + 6) % 7; }
    function comma(n) { return Math.round(n).toLocaleString("ko-KR"); }
    function nowKey() {
      const n = new Date();
      return dkey(n.getFullYear(), n.getMonth(), n.getDate());
    }

    // ══════════════════════════════════════════════════════════
    // ██  주휴수당 계산  ██
    // ══════════════════════════════════════════════════════════

    /**
     * 정산용 주휴수당 계산
     * 선택된 날짜 배열에서 월~일 7일이 모두 포함된 완성된 주 중
     * 주 근무시간 15h 이상인 주에만 주휴수당 지급
     */
    function calcBonus(dates, recs, bonusAmt) {
      if (!dates || dates.length === 0) return { weeks: 0, bonus: 0 };
      const sorted = [...dates].sort();
      function weekKey(dateStr) {
        const [y, m, d] = dateStr.split("-").map(Number);
        const dt = new Date(y, m - 1, d);
        const dow = (dt.getDay() + 6) % 7;
        const mon = new Date(dt); mon.setDate(dt.getDate() - dow);
        return `${mon.getFullYear()}-${String(mon.getMonth()+1).padStart(2,"0")}-${String(mon.getDate()).padStart(2,"0")}`;
      }
      const weekMap = {};
      sorted.forEach(dk => {
        const wk = weekKey(dk);
        if (!weekMap[wk]) weekMap[wk] = { keys: [] };
        weekMap[wk].keys.push(dk);
      });
      let qualifiedWeeks = 0;
      Object.entries(weekMap).forEach(([wk, { keys }]) => {
        const [wy, wm, wd] = wk.split("-").map(Number);
        const allSevenDays = [];
        for (let i = 0; i < 7; i++) {
          const dd = new Date(wy, wm - 1, wd + i);
          allSevenDays.push(`${dd.getFullYear()}-${String(dd.getMonth()+1).padStart(2,"0")}-${String(dd.getDate()).padStart(2,"0")}`);
        }
        const isComplete = allSevenDays.every(dk => sorted.includes(dk));
        const weekH = keys.reduce((s, dk) => s + (recs[dk] || 0), 0);
        if (isComplete && weekH >= 15) qualifiedWeeks++;
      });
      return { weeks: qualifiedWeeks, bonus: qualifiedWeeks * bonusAmt };
    }

    /**
     * 월간 주휴수당 계산 (정산내역 탭 요약용)
     * 7일 완성 조건 없이 주 근무시간 15h 이상인 주만 카운트
     */
    function calcBonusMonth(y, m, recs, bonusAmt) {
      function weekKey(dateStr) {
        const [ky, km, kd] = dateStr.split("-").map(Number);
        const dt = new Date(ky, km - 1, kd);
        const dow = (dt.getDay() + 6) % 7;
        const mon = new Date(dt); mon.setDate(dt.getDate() - dow);
        return `${mon.getFullYear()}-${String(mon.getMonth()+1).padStart(2,"0")}-${String(mon.getDate()).padStart(2,"0")}`;
      }
      const monthRecs = Object.entries(recs).filter(([k]) => {
        const [ry, rm] = k.split("-").map(Number); return ry === y && rm - 1 === m;
      });
      const weekH = {};
      monthRecs.forEach(([k, h]) => {
        const wk = weekKey(k);
        weekH[wk] = (weekH[wk] || 0) + h;
      });
      const qualifiedWeeks = Object.values(weekH).filter(h => h >= 15).length;
      return { weeks: qualifiedWeeks, bonus: qualifiedWeeks * bonusAmt };
    }

    /**
     * 이월 주휴 계산
     * 이달 마지막 주가 일요일로 끝나지 않으면 → 그 주 이달 근무시간을 다음달 정산으로 이월
     * 반환: { carryH: 이월 시간합, lastDayKey: 이월 표시 날짜 }
     */
    function getCarryover(y, m, recs) {
      const lastDay = daysIn(y, m);
      const lastDate = new Date(y, m, lastDay);
      const lastDow = (lastDate.getDay() + 6) % 7;
      if (lastDow === 6) return { carryH: 0, lastDayKey: null };
      const monDate = new Date(lastDate);
      monDate.setDate(lastDay - lastDow);
      const startD = monDate.getMonth() === m ? monDate.getDate() : 1;
      let carryH = 0;
      for (let d = startD; d <= lastDay; d++) {
        const k = dkey(y, m, d);
        if (recs[k]) carryH += recs[k];
      }
      return { carryH, lastDayKey: dkey(y, m, lastDay) };
    }

    /**
     * 6주 달력 그리드 생성 (전달·다음달 overflow 포함)
     * 총 42칸 고정
     */
    function buildGrid(y, m) {
      const cells = [], off = moff(y, m), dim = daysIn(y, m);
      const pM = m === 0 ? 11 : m - 1, pY = m === 0 ? y - 1 : y, pDim = daysIn(pY, pM);
      for (let i = off - 1; i >= 0; i--) cells.push({ y: pY, m: pM, d: pDim - i, ov: true });
      for (let d = 1; d <= dim; d++) cells.push({ y, m, d, ov: false });
      const nM = m === 11 ? 0 : m + 1, nY = m === 11 ? y + 1 : y;
      for (let d = 1; d <= 42 - cells.length; d++) cells.push({ y: nY, m: nM, d, ov: true });
      return cells;
    }

    // ══════════════════════════════════════════════════════════
    // ██  공통 UI 컴포넌트  ██
    // ══════════════════════════════════════════════════════════

    /** PIN 입력 점 표시 (로그인 화면) */
    function PinDots({ val, len = 4 }) {
      return (
        <div style={{ display: "flex", gap: 12, justifyContent: "center", padding: "10px 0" }}>
          {Array.from({ length: len }).map((_, i) => (
            <div key={i} style={{
              width: 14, height: 14, borderRadius: "50%",
              background: i < val.length ? T.btn : T.border,
              transition: "background 0.14s"
            }} />
          ))}
        </div>
      );
    }

    /** 숫자 키패드 (0~9 + 삭제) */
    function Numpad({ onKey, onDel }) {
      const ks = [1, 2, 3, 4, 5, 6, 7, 8, 9, null, 0, "⌫"];
      return (
        <div style={{ display: "grid", gridTemplateColumns: "repeat(3,1fr)", gap: 9, maxWidth: 272, margin: "0 auto" }}>
          {ks.map((k, i) => (
            <button key={i} disabled={k === null}
              onClick={() => { if (k === null) return; k === "⌫" ? onDel() : onKey(String(k)); }}
              style={{
                height: 56, borderRadius: 16,
                border: k === "⌫" ? `1px solid ${T.sun}44` : `1px solid ${T.border}`,
                background: k === "⌫" ? "#FEF2F2" : T.card,
                color: k === "⌫" ? T.sun : T.text,
                fontSize: k === "⌫" ? 18 : 22, fontWeight: 600,
                cursor: k === null ? "default" : "pointer", opacity: k === null ? 0 : 1,
                fontFamily: T.font, boxShadow: "0 1px 2px rgba(0,0,0,0.05)", transition: "transform 0.1s",
              }}
              onMouseDown={e => { if (k !== null) e.currentTarget.style.transform = "scale(0.91)"; }}
              onMouseUp={e => e.currentTarget.style.transform = "scale(1)"}
              onTouchStart={e => { if (k !== null) e.currentTarget.style.transform = "scale(0.91)"; }}
              onTouchEnd={e => e.currentTarget.style.transform = "scale(1)"}
            >{k}</button>
          ))}
        </div>
      );
    }

    /** 검정 둥근 버튼 (primary action) */
    function DarkBtn({ children, onClick, disabled = false, full = true }) {
      return (
        <button onClick={disabled ? undefined : onClick} disabled={disabled} style={{
          padding: "15px 20px", borderRadius: 100, border: "none",
          background: disabled ? T.border : T.btn, color: disabled ? T.sub : T.btnTxt,
          fontWeight: 700, fontSize: 15, cursor: disabled ? "not-allowed" : "pointer",
          fontFamily: T.font, width: full ? "100%" : "auto",
          display: "flex", alignItems: "center", justifyContent: "center", gap: 8,
          boxShadow: disabled ? "none" : "0 2px 10px rgba(0,0,0,0.2)", transition: "opacity 0.15s",
        }}
          onMouseEnter={e => { if (!disabled) e.currentTarget.style.opacity = "0.82"; }}
          onMouseLeave={e => { if (!disabled) e.currentTarget.style.opacity = "1"; }}
        >{children}</button>
      );
    }

    /** 외곽선 버튼 (secondary action) */
    function OutlineBtn({ children, onClick }) {
      return (
        <button onClick={onClick} style={{
          padding: "14px 20px", borderRadius: 100,
          border: `1.5px solid ${T.border}`, background: T.card, color: T.text,
          fontWeight: 600, fontSize: 15, cursor: "pointer", fontFamily: T.font,
          width: "100%", display: "flex", alignItems: "center", justifyContent: "center", gap: 8,
        }}>{children}</button>
      );
    }

    /** 톱니바퀴 아이콘 SVG */
    function GearIcon() {
      return (
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
      );
    }

    /**
     * 상단 앱바
     * - 좌측: 앱 아이콘 + 화면 타이틀
     * - 중앙: 로그인된 사용자 이름 + 아이콘 (pill 형태)
     * - 우측: 설정 톱니 버튼 (로그인 시만 표시)
     */
    function AppBar({ title, right, session, onSettings }) {
      const isMgr = session?.mode === "manager";
      const col = session && !isMgr ? C[session.id] : null;
      return (
        <div style={{
          position: "sticky", top: 0, zIndex: 100, background: T.surface,
          borderBottom: `1px solid ${T.border}`, padding: "0 16px",
          height: 56, display: "flex", alignItems: "center", justifyContent: "space-between",
        }}>
          <div style={{ display: "flex", alignItems: "center", gap: 8, minWidth: 44 }}>
            <span style={{ fontSize: 20 }}>⏱️</span>
            <div style={{ fontWeight: 800, fontSize: 15, color: T.text, lineHeight: 1 }}>{title}</div>
          </div>
          {session && (
            <div style={{
              position: "absolute", left: "50%", transform: "translateX(-50%)",
              display: "flex", alignItems: "center", gap: 6,
              background: isMgr ? "rgba(28,25,23,0.07)" : (col ? col.light : "transparent"),
              borderRadius: 100, padding: "4px 12px 4px 6px",
              border: `1px solid ${isMgr ? T.border : (col ? col.accent + "33" : T.border)}`,
              pointerEvents: "none",
            }}>
              <span style={{ fontSize: 16, lineHeight: 1 }}>{isMgr ? "👔" : col?.icon}</span>
              <span style={{ fontSize: 13, fontWeight: 800, color: isMgr ? T.text : col?.accent, whiteSpace: "nowrap" }}>{session.name}</span>
            </div>
          )}
          <div style={{ minWidth: 44, display: "flex", justifyContent: "flex-end", gap: 8 }}>
            {right}
            {session && onSettings && (
              <button onClick={onSettings} style={{
                width: 36, height: 36, borderRadius: "50%", border: `1px solid ${T.border}`,
                background: T.bg, color: T.sub, cursor: "pointer",
                display: "flex", alignItems: "center", justifyContent: "center", transition: "all 0.18s",
              }}
                onMouseEnter={e => { e.currentTarget.style.background = T.text; e.currentTarget.style.color = T.btnTxt; }}
                onMouseLeave={e => { e.currentTarget.style.background = T.bg; e.currentTarget.style.color = T.sub; }}
              ><GearIcon /></button>
            )}
          </div>
        </div>
      );
    }

    /** 달력 월 네비게이션 (◂ 2026년 4월 ▸) */
    function MonthNav({ view, prev, next }) {
      return (
        <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "12px 16px 8px" }}>
          <button onClick={prev} style={{ background: "none", border: "none", fontSize: 24, cursor: "pointer", color: T.text, padding: "4px 10px" }}>‹</button>
          <span style={{ fontWeight: 800, fontSize: 20, color: T.text }}>{view.y}년 {MN[view.m]}</span>
          <button onClick={next} style={{ background: "none", border: "none", fontSize: 24, cursor: "pointer", color: T.text, padding: "4px 10px" }}>›</button>
        </div>
      );
    }

    /**
     * 하단 탭바
     * 스태프: 홈 · 시간입력 · 정산내역
     * 매니저: 홈 · 근무현황 · 정산하기
     * 현재 탭을 다시 누르면 화면 새로고침 (onRefresh)
     */
    function BottomTabs({ tab, setTab, onRefresh, session }) {
      const isMgr = session?.mode === "manager";
      const tabs = [
        { id: "home", activeIcon: "🏠", icon: "🏡", label: "홈" },
        { id: "cal", activeIcon: "📅", icon: "📆", label: isMgr ? "근무현황" : "시간입력" },
        { id: "settle", activeIcon: "💰", icon: "💳", label: isMgr ? "정산하기" : "정산내역" },
      ];
      return (
        <div style={{
          position: "fixed", bottom: 0, left: 0, right: 0, zIndex: 200,
          background: T.surface, borderTop: `1px solid ${T.border}`,
          display: "flex", paddingBottom: "env(safe-area-inset-bottom,0)",
        }}>
          {tabs.map(t => (
            <button key={t.id} onClick={() => { if (tab === t.id) onRefresh(); else setTab(t.id); }} style={{
              flex: 1, padding: "10px 0 13px", border: "none", background: "none",
              cursor: "pointer", fontFamily: T.font,
              display: "flex", flexDirection: "column", alignItems: "center", gap: 3,
            }}>
              <span style={{ fontSize: 22 }}>{tab === t.id ? t.activeIcon : t.icon}</span>
              <span style={{ fontSize: 14, fontWeight: tab === t.id ? 800 : 500, color: tab === t.id ? T.btn : T.muted }}>{t.label}</span>
            </button>
          ))}
        </div>
      );
    }

    /** 화면 래퍼 (하단 탭바 여백 포함) */
    function Screen({ children }) {
      return (
        <div style={{ minHeight: "100vh", paddingBottom: 72, background: T.bg, fontFamily: T.font, color: T.text }}>
          {children}
        </div>
      );
    }

    /** 토스트 알림 (상단 중앙, 2초 자동 소멸) */
    function Toast({ msg }) {
      if (!msg) return null;
      return (
        <div style={{
          position: "fixed", top: 20, left: "50%", transform: "translateX(-50%)",
          background: T.btn, color: T.btnTxt, borderRadius: 100,
          padding: "11px 22px", fontWeight: 700, fontSize: 15, fontFamily: T.font,
          zIndex: 9999, whiteSpace: "nowrap", boxShadow: "0 4px 20px rgba(0,0,0,0.22)",
        }}>{msg}</div>
      );
    }

    // ══════════════════════════════════════════════════════════
    // ██  설정 화면 컴포넌트  ██
    // ══════════════════════════════════════════════════════════

    const AVATARS = ["🐱","🐶","🐰","🦊","🐨","🐻","🐼","🐸","🦁","🐯","🐺","🦋","🐙","🦄","🐧","🌸"];

    /** 공통 팝업 모달 (반투명 배경 + 카드) */
    function Modal({ title, onClose, children }) {
      return (
        <div style={{
          position: "fixed", inset: 0, background: "rgba(28,25,23,0.5)",
          display: "flex", alignItems: "center", justifyContent: "center",
          zIndex: 600, backdropFilter: "blur(4px)", padding: "0 24px"
        }} onClick={onClose}>
          <div style={{
            background: T.surface, borderRadius: 24, padding: "24px 22px 22px",
            width: "100%", maxWidth: 360, boxShadow: "0 8px 40px rgba(0,0,0,0.2)"
          }} onClick={e => e.stopPropagation()}>
            <p style={{ margin: "0 0 18px", fontWeight: 900, fontSize: 17, color: T.text }}>{title}</p>
            {children}
          </div>
        </div>
      );
    }

    /** 4자리 PIN 입력 필드 (설정 화면용) */
    function PinInput4({ value, onChange, label }) {
      return (
        <div style={{ marginBottom: 14 }}>
          {label && <p style={{ margin: "0 0 6px", fontSize: 13, color: T.sub, fontWeight: 700 }}>{label}</p>}
          <input type="password" inputMode="numeric" maxLength={4} value={value}
            onChange={e => onChange(e.target.value.replace(/\D/g, "").slice(0, 4))}
            placeholder="• • • •"
            style={{
              width: "100%", boxSizing: "border-box", background: T.bg,
              border: `1.5px solid ${T.border}`, borderRadius: 14,
              padding: "13px 16px", fontSize: 22, fontWeight: 800, letterSpacing: 8,
              fontFamily: T.font, color: T.text, outline: "none", textAlign: "center"
            }} />
        </div>
      );
    }

    /**
     * 설정 오버레이 화면
     *
     * 스태프 메뉴:
     *   - 닉네임 변경 (KV staff_list 업데이트)
     *   - 아바타 변경 (KV staff_list 업데이트)
     *   - 비밀번호 변경 (KV staff_list 업데이트)
     *   - 로그아웃 (로컬스토리지 "saved" 삭제)
     *
     * 매니저 메뉴:
     *   - 직원 관리: PIN 초기화 / 삭제 (KV staff_list 업데이트)
     *   - 직원 추가 (KV staff_list 업데이트)
     *   - 매니저 비번 변경 (KV mgr_pin 업데이트)
     *   - 로그아웃
     */
    function SettingsOverlay({ session, setSession, onClose }) {
      const isMgr = session?.mode === "manager";
      const [staffList, setStaffList] = useState([]);
      const [popup, setPopup] = useState(null);
      const [toast, setToast] = useState("");
      const [loading, setLoading] = useState(false);

      // 폼 상태
      const [nickVal, setNickVal] = useState(session?.name || "");
      const [oldPin, setOldPin] = useState("");
      const [newPin1, setNewPin1] = useState("");
      const [newPin2, setNewPin2] = useState("");
      const [pinErr, setPinErr] = useState("");
      const [newName, setNewName] = useState("");
      const [newStaffPin, setNewStaffPin] = useState("1234");
      const [delTarget, setDelTarget] = useState(null);
      const [resetTarget, setResetTarget] = useState(null);
      const [resetPin, setResetPin] = useState("1234");

      // 직원 목록 초기 로드 (KV)
      useEffect(() => {
        getStaff().then(setStaffList);
      }, []);

      const showToast = m => { setToast(m); setTimeout(() => setToast(""), 2200); };
      const closePopup = () => {
        setPopup(null); setPinErr("");
        setOldPin(""); setNewPin1(""); setNewPin2("");
      };
      const refreshList = () => getStaff().then(setStaffList);

      /** 닉네임 변경 → KV staff_list 업데이트 */
      const saveNick = async () => {
        if (!nickVal.trim()) return;
        setLoading(true);
        const list = (await getStaff()).map(u => u.id === session.id ? { ...u, name: nickVal.trim() } : u);
        await saveStaff(list);
        setStaffList(list);
        setSession({ ...session, name: nickVal.trim() });
        showToast("닉네임이 변경되었어요 ✓"); closePopup(); setLoading(false);
      };

      /** 아바타 변경 → KV staff_list 업데이트 */
      const saveAvatar = async (icon) => {
        setLoading(true);
        if (C[session.id]) C[session.id].icon = icon;
        const list = (await getStaff()).map(u => u.id === session.id ? { ...u, icon } : u);
        await saveStaff(list); setStaffList(list);
        showToast("아바타가 변경되었어요 ✓"); closePopup(); setLoading(false);
      };

      /** 직원 추가 → KV staff_list 업데이트 */
      const addStaff = async () => {
        if (!newName.trim()) return;
        setLoading(true);
        const list = await getStaff();
        const maxId = list.reduce((m, u) => Math.max(m, parseInt(u.id)), 0);
        const id = String(maxId + 1).padStart(2, "0");
        const icons = ["🐱","🐶","🐰","🦊","🐨","🐻","🐼","🐸","🦁","🐯","🐺","🦋"];
        if (!C[id]) C[id] = { accent: "#888888", light: "#F5F5F5", icon: icons[maxId % icons.length] };
        const updated = [...list, { id, pin: newStaffPin || "1234", name: newName.trim() }];
        await saveStaff(updated); setStaffList(updated);
        setNewName(""); setNewStaffPin("1234");
        showToast(`${newName} 추가 완료 ✓`); setLoading(false);
      };

      /** 직원 삭제 → KV staff_list 업데이트 */
      const confirmDelete = async () => {
        if (!delTarget) return;
        setLoading(true);
        const list = (await getStaff()).filter(u => u.id !== delTarget.id);
        await saveStaff(list); setStaffList(list);
        showToast(`${delTarget.name} 삭제 완료`);
        setDelTarget(null); closePopup(); setLoading(false);
      };

      /** 매니저 비번 변경 → KV mgr_pin 업데이트 */
      const saveMgrPinChange = async () => {
        const curPin = await getMgrPin();
        if (oldPin !== curPin) { setPinErr("기존 비밀번호가 틀렸습니다"); return; }
        if (newPin1.length < 4) { setPinErr("새 비밀번호는 4자리여야 합니다"); return; }
        if (newPin1 !== newPin2) { setPinErr("새 비밀번호가 일치하지 않습니다"); return; }
        setLoading(true);
        await saveMgrPin(newPin1);
        showToast("비밀번호가 변경되었어요 ✓"); closePopup(); setLoading(false);
      };

      /** 스태프 비번 변경 → KV staff_list 업데이트 */
      const saveStaffPin = async () => {
        const list = await getStaff();
        const me = list.find(u => u.id === session.id);
        if (!me) { setPinErr("오류: 직원 정보를 찾을 수 없습니다"); return; }
        if (oldPin !== me.pin) { setPinErr("기존 비밀번호가 틀렸습니다"); return; }
        if (newPin1.length < 4) { setPinErr("새 비밀번호는 4자리여야 합니다"); return; }
        if (newPin1 !== newPin2) { setPinErr("새 비밀번호가 일치하지 않습니다"); return; }
        setLoading(true);
        const updated = list.map(u => u.id === session.id ? { ...u, pin: newPin1 } : u);
        await saveStaff(updated); setStaffList(updated);
        showToast("비밀번호가 변경되었어요 ✓"); closePopup(); setLoading(false);
      };

      /** 스태프 비번 초기화 → KV staff_list 업데이트 */
      const saveResetPin = async () => {
        if (!resetTarget || !resetPin) return;
        setLoading(true);
        const list = (await getStaff()).map(u => u.id === resetTarget.id ? { ...u, pin: resetPin } : u);
        await saveStaff(list); setStaffList(list);
        showToast(`${resetTarget.name} 비밀번호 초기화 완료 ✓`);
        setResetTarget(null); closePopup(); setLoading(false);
      };

      const currentIcon = session && C[session.id] ? C[session.id].icon : "🐱";

      return (
        <div style={{ position: "fixed", inset: 0, zIndex: 500, background: T.bg, fontFamily: T.font, display: "flex", flexDirection: "column", paddingBottom: 72, overflowY: "auto" }}>
          {/* 헤더 */}
          <div style={{ position: "sticky", top: 0, zIndex: 10, background: T.surface, borderBottom: `1px solid ${T.border}`, padding: "0 18px", height: 56, display: "flex", alignItems: "center", justifyContent: "space-between" }}>
            <button onClick={onClose} style={{ background: "none", border: "none", fontSize: 15, fontWeight: 700, color: T.sub, cursor: "pointer", fontFamily: T.font, padding: "4px 0" }}>← 닫기</button>
            <span style={{ fontWeight: 900, fontSize: 16, color: T.text }}>설정</span>
            <div style={{ width: 48 }} />
          </div>

          {toast && <div style={{ position: "fixed", top: 20, left: "50%", transform: "translateX(-50%)", background: T.btn, color: T.btnTxt, borderRadius: 100, padding: "11px 22px", fontWeight: 700, fontSize: 15, zIndex: 9999, whiteSpace: "nowrap", boxShadow: "0 4px 20px rgba(0,0,0,0.22)" }}>{toast}</div>}

          <div style={{ padding: "20px 16px 0" }}>
            {/* ── 스태프 설정 ── */}
            {!isMgr && (
              <>
                <p style={{ margin: "0 0 10px", fontSize: 15, fontWeight: 800, color: T.sub }}>내 정보</p>
                {[
                  { icon: "✏️", label: "닉네임 변경", desc: `현재: ${session.name}`, action: () => { setNickVal(session.name); setPopup("nick"); } },
                  { icon: currentIcon, label: "아바타 변경", desc: "이모지 아이콘 선택", action: () => setPopup("avatar") },
                  { icon: "🔑", label: "비밀번호 변경", desc: "기존 비번 확인 후 변경", action: () => { setOldPin(""); setNewPin1(""); setNewPin2(""); setPinErr(""); setPopup("staffPin"); } },
                ].map(item => (
                  <button key={item.label} onClick={item.action} style={{ width: "100%", background: T.surface, border: `1px solid ${T.border}`, borderRadius: 16, padding: "16px 18px", marginBottom: 10, cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "space-between", fontFamily: T.font }}>
                    <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
                      <span style={{ fontSize: 22 }}>{item.icon}</span>
                      <div style={{ textAlign: "left" }}>
                        <p style={{ margin: 0, fontWeight: 700, fontSize: 15, color: T.text }}>{item.label}</p>
                        <p style={{ margin: "2px 0 0", fontSize: 14, color: T.sub }}>{item.desc}</p>
                      </div>
                    </div>
                    <span style={{ color: T.muted, fontSize: 18 }}>›</span>
                  </button>
                ))}
              </>
            )}

            {/* ── 매니저 설정 ── */}
            {isMgr && (
              <>
                <p style={{ margin: "0 0 10px", fontSize: 15, fontWeight: 800, color: T.sub }}>직원 관리</p>
                <div style={{ background: T.surface, border: `1px solid ${T.border}`, borderRadius: 16, marginBottom: 10, overflow: "hidden" }}>
                  {staffList.map((u, i) => (
                    <div key={u.id} style={{ display: "flex", alignItems: "center", gap: 12, padding: "13px 18px", borderBottom: i < staffList.length - 1 ? `1px solid ${T.border}` : "none" }}>
                      <div style={{ width: 36, height: 36, borderRadius: "50%", background: C[u.id] ? C[u.id].light : "#f0f0f0", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 18, flexShrink: 0 }}>
                        {C[u.id] ? C[u.id].icon : "👤"}
                      </div>
                      <div style={{ flex: 1 }}>
                        <p style={{ margin: 0, fontWeight: 700, fontSize: 15 }}>{u.name}</p>
                        <p style={{ margin: "1px 0 0", fontSize: 13, color: T.sub }}>ID: {u.id} · PIN: {"•".repeat(u.pin.length)}</p>
                      </div>
                      <button onClick={() => { setResetTarget(u); setResetPin("1234"); setPopup("resetPin"); }} style={{ padding: "6px 12px", borderRadius: 100, border: `1px solid ${T.border}`, background: T.bg, color: T.sub, fontSize: 13, fontWeight: 700, cursor: "pointer", fontFamily: T.font, marginRight: 6 }}>PIN 초기화</button>
                      <button onClick={() => { setDelTarget(u); setPopup("deleteStaff"); }} style={{ padding: "6px 12px", borderRadius: 100, border: `1px solid ${T.sun}44`, background: "#FEF2F2", color: T.sun, fontSize: 13, fontWeight: 700, cursor: "pointer", fontFamily: T.font }}>삭제</button>
                    </div>
                  ))}
                </div>
                <button onClick={() => { setNewName(""); setNewStaffPin("1234"); setPopup("addStaff"); }} style={{ width: "100%", background: T.btn, border: "none", borderRadius: 100, padding: "14px 20px", marginBottom: 20, cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center", gap: 8, fontFamily: T.font, fontWeight: 700, fontSize: 15, color: T.btnTxt, boxShadow: "0 2px 10px rgba(0,0,0,0.15)" }}>＋ 직원 추가</button>
                <p style={{ margin: "0 0 10px", fontSize: 15, fontWeight: 800, color: T.sub }}>보안</p>
                <button onClick={() => { setOldPin(""); setNewPin1(""); setNewPin2(""); setPinErr(""); setPopup("mgrPin"); }} style={{ width: "100%", background: T.surface, border: `1px solid ${T.border}`, borderRadius: 16, padding: "16px 18px", cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "space-between", fontFamily: T.font }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
                    <span style={{ fontSize: 22 }}>🔐</span>
                    <div style={{ textAlign: "left" }}>
                      <p style={{ margin: 0, fontWeight: 700, fontSize: 15, color: T.text }}>매니저 비밀번호 변경</p>
                      <p style={{ margin: "2px 0 0", fontSize: 14, color: T.sub }}>기존 비번 확인 후 변경</p>
                    </div>
                  </div>
                  <span style={{ color: T.muted, fontSize: 18 }}>›</span>
                </button>
              </>
            )}

            {/* 로그아웃 — 로컬스토리지 "saved" 삭제 */}
            <div style={{ marginTop: 24 }}>
              <button onClick={() => { LS.del("saved"); setSession(null); onClose(); }} style={{ width: "100%", padding: "14px", borderRadius: 100, border: `1px solid ${T.sun}44`, background: "#FEF2F2", color: T.sun, fontWeight: 700, fontSize: 15, cursor: "pointer", fontFamily: T.font }}>로그아웃</button>
            </div>
          </div>

          {/* ── 팝업들 ── */}
          {popup === "nick" && (
            <Modal title="닉네임 변경" onClose={closePopup}>
              <input value={nickVal} onChange={e => setNickVal(e.target.value)} placeholder="새 닉네임 입력" style={{ width: "100%", boxSizing: "border-box", background: T.bg, border: `1.5px solid ${T.border}`, borderRadius: 14, padding: "13px 16px", fontSize: 16, fontFamily: T.font, color: T.text, outline: "none", marginBottom: 16 }} />
              <div style={{ display: "flex", gap: 10 }}>
                <OutlineBtn onClick={closePopup}>취소</OutlineBtn>
                <DarkBtn onClick={saveNick}>{loading ? "저장 중..." : "저장"}</DarkBtn>
              </div>
            </Modal>
          )}
          {popup === "avatar" && (
            <Modal title="아바타 변경" onClose={closePopup}>
              <div style={{ display: "grid", gridTemplateColumns: "repeat(4,1fr)", gap: 10, marginBottom: 16 }}>
                {AVATARS.map(icon => (
                  <button key={icon} onClick={() => saveAvatar(icon)} style={{ height: 56, borderRadius: 14, border: `2px solid ${icon === currentIcon ? T.btn : T.border}`, background: icon === currentIcon ? T.btn : "none", fontSize: 26, cursor: "pointer", transition: "all 0.15s" }}>{icon}</button>
                ))}
              </div>
              <OutlineBtn onClick={closePopup}>취소</OutlineBtn>
            </Modal>
          )}
          {popup === "addStaff" && (
            <Modal title="직원 추가" onClose={closePopup}>
              <div style={{ marginBottom: 12 }}>
                <p style={{ margin: "0 0 6px", fontSize: 14, color: T.sub, fontWeight: 700 }}>이름</p>
                <input value={newName} onChange={e => setNewName(e.target.value)} placeholder="직원 이름" style={{ width: "100%", boxSizing: "border-box", background: T.bg, border: `1.5px solid ${T.border}`, borderRadius: 14, padding: "12px 16px", fontSize: 16, fontFamily: T.font, color: T.text, outline: "none" }} />
              </div>
              <div style={{ marginBottom: 16 }}>
                <p style={{ margin: "0 0 6px", fontSize: 14, color: T.sub, fontWeight: 700 }}>초기 비밀번호 (4자리)</p>
                <input value={newStaffPin} onChange={e => setNewStaffPin(e.target.value.replace(/\D/g, "").slice(0, 4))} placeholder="1234" inputMode="numeric" style={{ width: "100%", boxSizing: "border-box", background: T.bg, border: `1.5px solid ${T.border}`, borderRadius: 14, padding: "12px 16px", fontSize: 18, fontWeight: 700, letterSpacing: 6, fontFamily: T.font, color: T.text, outline: "none", textAlign: "center" }} />
              </div>
              <div style={{ display: "flex", gap: 10 }}>
                <OutlineBtn onClick={closePopup}>취소</OutlineBtn>
                <DarkBtn onClick={() => { addStaff(); closePopup(); }}>{loading ? "추가 중..." : "추가"}</DarkBtn>
              </div>
            </Modal>
          )}
          {popup === "deleteStaff" && delTarget && (
            <Modal title="직원 삭제" onClose={closePopup}>
              <div style={{ textAlign: "center", marginBottom: 20 }}>
                <div style={{ fontSize: 40, marginBottom: 10 }}>{C[delTarget.id] ? C[delTarget.id].icon : "👤"}</div>
                <p style={{ margin: 0, fontWeight: 800, fontSize: 17 }}>{delTarget.name}</p>
                <p style={{ margin: "10px 0 0", fontSize: 14, color: T.sub, lineHeight: 1.6 }}>삭제하면 해당 직원의 근무기록도<br />함께 삭제됩니다. 계속하시겠습니까?</p>
              </div>
              <div style={{ display: "flex", gap: 10 }}>
                <OutlineBtn onClick={closePopup}>취소</OutlineBtn>
                <button onClick={confirmDelete} style={{ flex: 1, padding: "14px", borderRadius: 100, border: "none", background: "#B91C1C", color: "#fff", fontWeight: 700, fontSize: 15, cursor: "pointer", fontFamily: T.font }}>{loading ? "삭제 중..." : "삭제"}</button>
              </div>
            </Modal>
          )}
          {popup === "mgrPin" && (
            <Modal title="매니저 비밀번호 변경" onClose={closePopup}>
              <PinInput4 value={oldPin} onChange={setOldPin} label="기존 비밀번호" />
              <PinInput4 value={newPin1} onChange={setNewPin1} label="새 비밀번호" />
              <PinInput4 value={newPin2} onChange={setNewPin2} label="새 비밀번호 확인" />
              {pinErr && <p style={{ margin: "0 0 10px", color: T.sun, fontSize: 14, fontWeight: 600 }}>{pinErr}</p>}
              <div style={{ display: "flex", gap: 10, marginTop: 4 }}>
                <OutlineBtn onClick={closePopup}>취소</OutlineBtn>
                <DarkBtn onClick={saveMgrPinChange}>{loading ? "변경 중..." : "변경"}</DarkBtn>
              </div>
            </Modal>
          )}
          {popup === "staffPin" && (
            <Modal title="비밀번호 변경" onClose={closePopup}>
              <PinInput4 value={oldPin} onChange={v => { setOldPin(v); setPinErr(""); }} label="기존 비밀번호" />
              <PinInput4 value={newPin1} onChange={v => { setNewPin1(v); setPinErr(""); }} label="새 비밀번호" />
              <PinInput4 value={newPin2} onChange={v => { setNewPin2(v); setPinErr(""); }} label="새 비밀번호 확인" />
              {pinErr && <p style={{ margin: "0 0 10px", color: T.sun, fontSize: 14, fontWeight: 600 }}>{pinErr}</p>}
              <div style={{ display: "flex", gap: 10, marginTop: 4 }}>
                <OutlineBtn onClick={closePopup}>취소</OutlineBtn>
                <DarkBtn onClick={saveStaffPin}>{loading ? "변경 중..." : "변경"}</DarkBtn>
              </div>
            </Modal>
          )}
          {popup === "resetPin" && resetTarget && (
            <Modal title={`${resetTarget.name} 비번 초기화`} onClose={closePopup}>
              <p style={{ margin: "0 0 14px", fontSize: 14, color: T.sub }}>새 비밀번호를 설정해 주세요</p>
              <PinInput4 value={resetPin} onChange={setResetPin} label="새 비밀번호 (4자리)" />
              <div style={{ display: "flex", gap: 10, marginTop: 4 }}>
                <OutlineBtn onClick={closePopup}>취소</OutlineBtn>
                <DarkBtn onClick={saveResetPin}>{loading ? "저장 중..." : "저장 후 닫기"}</DarkBtn>
              </div>
            </Modal>
          )}
        </div>
      );
    }

    // ══════════════════════════════════════════════════════════
    // ██  홈 탭  ██
    // - 미로그인: 직원 선택 → PIN 입력 / 매니저 로그인
    // - 로그인 후: 프로필 + 이번달 요약 (스태프) 또는 직원별 현황 (매니저)
    // ══════════════════════════════════════════════════════════
    function HomeTab({ session, setSession, onSettings }) {
      const [step, setStep] = useState("select");
      const [selUser, setSelUser] = useState(null);
      const [pin, setPin] = useState("");
      const [err, setErr] = useState("");
      const [remember, setRemember] = useState(true);
      const [staffList, setStaffList] = useState([]);

      // KV에서 직원 목록 로드
      useEffect(() => {
        getStaff().then(list => {
          setStaffList(list);
          // C 컬러맵에 없는 직원 추가 (동적 추가된 직원)
          list.forEach(u => {
            if (!C[u.id]) C[u.id] = { accent: "#888888", light: "#F5F5F5", icon: u.icon || "👤" };
            if (u.icon) C[u.id].icon = u.icon;
          });
        });
      }, []);

      const press = k => {
        if (pin.length >= 4) return;
        const np = pin + k; setPin(np); setErr("");
        if (np.length === 4) setTimeout(() => tryLogin(np), 140);
      };
      const del = () => setPin(p => p.slice(0, -1));

      const tryLogin = async p => {
        if (step === "mgr-pin") {
          const curPin = await getMgrPin();
          if (p === curPin) {
            // 로그인 유지 → 로컬스토리지 "saved" 저장
            if (remember) LS.set("saved", { mode: "manager" });
            setSession({ id: "00", name: "매니저", mode: "manager" });
            setStep("select"); setPin("");
          } else { setErr("비밀번호가 틀렸습니다"); setPin(""); }
        } else {
          const u = selUser;
          if (u && p === u.pin) {
            if (remember) LS.set("saved", { id: u.id, mode: "staff" });
            setSession({ ...u, mode: "staff" });
            setStep("select"); setPin("");
          } else { setErr("비밀번호가 틀렸습니다"); setPin(""); }
        }
      };

      // ── 로그인 후 화면 ────────────────────────────────────
      if (session) {
        const isMgr = session.mode === "manager";
        const col = isMgr ? null : C[session.id];

        if (!isMgr) {
          // 스태프 홈 — 이번달 근무시간 요약
          const [monthH, setMonthH] = useState(0);
          const [settings, setSettings] = useState({ wage: 10030 });
          useEffect(() => {
            Promise.all([getRecs(session.id), getSettings()]).then(([recs, s]) => {
              const n = new Date();
              const h = Object.entries(recs).filter(([k]) => {
                const [y, mo] = k.split("-").map(Number);
                return y === n.getFullYear() && mo - 1 === n.getMonth();
              }).reduce((sum, [, v]) => sum + v, 0);
              setMonthH(h); setSettings(s);
            });
          }, [session.id]);

          return (
            <Screen>
              <AppBar title="근무 기록부" session={session} onSettings={onSettings} />
              <div style={{ padding: "28px 20px 0", textAlign: "center" }}>
                <div style={{ width: 84, height: 84, borderRadius: "50%", background: col.light, border: `2px solid ${col.accent}44`, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 42, margin: "0 auto 14px" }}>{col.icon}</div>
                <h2 style={{ margin: 0, fontSize: 26, fontWeight: 900 }}>{session.name}</h2>
              </div>
              <div style={{ margin: "16px 16px 0", background: T.surface, borderRadius: 18, border: `1px solid ${T.border}`, padding: "18px 20px" }}>
                <p style={{ margin: 0, fontSize: 14, color: T.sub, fontWeight: 600 }}>이번달 총 근무시간</p>
                <p style={{ margin: "6px 0 0", fontSize: 30, fontWeight: 900, color: col.accent }}>
                  {monthH.toFixed(1)}<span style={{ fontSize: 14, color: T.sub, marginLeft: 4, fontWeight: 500 }}>시간</span>
                </p>
                <p style={{ margin: "4px 0 0", fontSize: 14, color: T.sub }}>예상 급여 {comma(monthH * settings.wage)}원</p>
              </div>
            </Screen>
          );
        }

        // 매니저 홈 — 직원별 이번달/이번주 현황
        const [staffStats, setStaffStats] = useState([]);
        const [totals, setTotals] = useState({ monthH: 0, paid: 0, unpaid: 0 });
        const [settings, setSettings] = useState({ wage: 10030, bonusAmt: 10030 });

        useEffect(() => {
          Promise.all([getStaff(), getSettings(), getSettled()]).then(async ([list, s, settled]) => {
            setSettings(s);
            const now = new Date();
            const wy = now.getFullYear(), wm = now.getMonth();
            const todayDow = (now.getDay() + 6) % 7;
            const monDate = new Date(now); monDate.setDate(now.getDate() - todayDow);
            const weekKeys = [];
            for (let i = 0; i < 7; i++) {
              const d = new Date(monDate); d.setDate(monDate.getDate() + i);
              weekKeys.push(dkey(d.getFullYear(), d.getMonth(), d.getDate()));
            }
            const stats = await Promise.all(list.map(async u => {
              if (!C[u.id]) C[u.id] = { accent: "#888888", light: "#F5F5F5", icon: u.icon || "👤" };
              const r = await getRecs(u.id);
              const mH = Object.entries(r).filter(([k]) => {
                const [y, mo] = k.split("-").map(Number); return y === wy && mo - 1 === wm;
              }).reduce((sum, [, v]) => sum + v, 0);
              const wH = weekKeys.reduce((sum, k) => sum + (r[k] || 0), 0);
              const myKeys = Object.keys(settled).filter(k => k.startsWith(u.id + "_"));
              const { bonus: bPaid } = calcBonus(myKeys.flatMap(sk => Array.isArray(settled[sk]) ? settled[sk] : []), r, s.bonusAmt || 0);
              const mSettledPay = myKeys.reduce((sum, sk) => {
                const dates = settled[sk];
                if (!Array.isArray(dates)) return sum;
                const { bonus } = calcBonus(dates, r, s.bonusAmt || 0);
                const h = dates.filter(dk => { const [y, mo] = dk.split("-").map(Number); return y === wy && mo - 1 === wm; }).reduce((hh, dk) => hh + (r[dk] || 0), 0);
                return sum + h * s.wage + bonus;
              }, 0);
              const unpaidPay = Math.max(0, mH * s.wage - mSettledPay);
              return { u, mH, wH, mSettledPay, unpaidPay };
            }));
            setStaffStats(stats);
            setTotals({
              monthH: stats.reduce((s, x) => s + x.mH, 0),
              paid: stats.reduce((s, x) => s + x.mSettledPay, 0),
              unpaid: stats.reduce((s, x) => s + x.unpaidPay, 0),
            });
          });
        }, []);

        const now = new Date();
        return (
          <Screen>
            <AppBar title="근무 기록부" session={session} onSettings={onSettings} />
            <div style={{ display: "flex", gap: 8, padding: "14px 14px 0" }}>
              {[
                { label: "이번달 총 근무", value: `${totals.monthH.toFixed(1)}h`, color: T.text },
                { label: "지급 완료", value: `${comma(totals.paid)}원`, color: "#15803D" },
                { label: "미지급", value: `${comma(totals.unpaid)}원`, color: "#B91C1C" },
              ].map(s => (
                <div key={s.label} style={{ flex: 1, background: T.surface, borderRadius: 14, border: `1px solid ${T.border}`, padding: "12px 8px", textAlign: "center" }}>
                  <p style={{ margin: 0, fontSize: 13, color: T.sub, fontWeight: 700, marginBottom: 5 }}>{s.label}</p>
                  <p style={{ margin: 0, fontSize: 14, fontWeight: 900, color: s.color }}>{s.value}</p>
                </div>
              ))}
            </div>
            <div style={{ padding: "14px 14px 0" }}>
              <p style={{ margin: "0 0 10px", fontSize: 15, fontWeight: 800, color: T.sub }}>직원별 현황 · {now.getFullYear()}년 {MN[now.getMonth()]}</p>
              {staffStats.map(({ u, mH, wH, mSettledPay, unpaidPay }) => {
                const col = C[u.id] || { accent: "#888", light: "#f5f5f5", icon: "👤" };
                return (
                  <div key={u.id} style={{ background: T.surface, borderRadius: 20, border: `1px solid ${T.border}`, marginBottom: 10, overflow: "hidden" }}>
                    <div style={{ display: "flex", alignItems: "center", gap: 12, padding: "14px 16px 12px", borderBottom: `1px solid ${T.border}` }}>
                      <div style={{ width: 42, height: 42, borderRadius: "50%", background: col.light, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 22, flexShrink: 0 }}>{col.icon}</div>
                      <div style={{ flex: 1 }}>
                        <p style={{ margin: 0, fontWeight: 800, fontSize: 16 }}>{u.name}</p>
                        <p style={{ margin: "2px 0 0", fontSize: 14, color: T.sub }}>이번주 {wH.toFixed(1)}h · 이번달 {mH.toFixed(1)}h</p>
                      </div>
                      <div style={{ textAlign: "right" }}>
                        <p style={{ margin: 0, fontSize: 15, fontWeight: 900, color: col.accent }}>{comma(mH * settings.wage)}원</p>
                        <p style={{ margin: "2px 0 0", fontSize: 14, color: T.sub }}>월 예상</p>
                      </div>
                    </div>
                    <div style={{ display: "flex", padding: "10px 16px", gap: 8 }}>
                      {[
                        { label: "지급 완료", val: mSettledPay, active: mSettledPay > 0, bg: "#F0FDF4", bdr: "#BBF7D0", c: "#15803D", icon: "✅", none: "⬜" },
                        { label: "미지급", val: unpaidPay, active: unpaidPay > 0, bg: "#FEF2F2", bdr: "#FECACA", c: "#B91C1C", icon: "🔴", none: "✅" },
                      ].map(row => (
                        <div key={row.label} style={{ flex: 1, display: "flex", alignItems: "center", gap: 6, background: row.active ? row.bg : "#F9F9F9", borderRadius: 10, padding: "8px 12px", border: `1px solid ${row.active ? row.bdr : T.border}` }}>
                          <span style={{ fontSize: 15 }}>{row.active ? row.icon : row.none}</span>
                          <div>
                            <p style={{ margin: 0, fontSize: 13, color: row.active ? row.c : T.muted, fontWeight: 700 }}>{row.label}</p>
                            <p style={{ margin: 0, fontSize: 14, fontWeight: 800, color: row.active ? row.c : T.muted }}>{row.active ? `${comma(row.val)}원` : row.label === "지급 완료" ? "—" : "없음"}</p>
                          </div>
                        </div>
                      ))}
                    </div>
                  </div>
                );
              })}
            </div>
            <div style={{ height: 8 }} />
          </Screen>
        );
      }

      // ── 미로그인 화면 ─────────────────────────────────────
      return (
        <Screen>
          <AppBar title="근무 기록부" />
          {step === "select" && (
            <div style={{ padding: "28px 20px 0" }}>
              <div style={{ textAlign: "center", marginBottom: 28 }}>
                <div style={{ width: 68, height: 68, borderRadius: "50%", background: T.surface, border: `1px solid ${T.border}`, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 30, margin: "0 auto 14px" }}>👤</div>
                <h2 style={{ margin: 0, fontSize: 22, fontWeight: 800 }}>직원을 선택하세요</h2>
                <p style={{ margin: "8px 0 0", color: T.sub, fontSize: 14 }}>본인 이름을 탭해서 로그인하세요</p>
              </div>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, marginBottom: 14 }}>
                {staffList.map(u => (
                  <button key={u.id} onClick={() => { setSelUser(u); setPin(""); setErr(""); setStep("staff-pin"); }}
                    style={{ padding: "20px 12px", borderRadius: 20, border: `1.5px solid ${T.border}`, background: T.card, color: T.text, cursor: "pointer", fontFamily: T.font, display: "flex", flexDirection: "column", alignItems: "center", gap: 8, boxShadow: "0 1px 4px rgba(0,0,0,0.06)", transition: "all 0.18s" }}
                    onMouseEnter={e => e.currentTarget.style.borderColor = T.btn}
                    onMouseLeave={e => e.currentTarget.style.borderColor = T.border}
                  >
                    <span style={{ fontSize: 32 }}>{C[u.id]?.icon || "👤"}</span>
                    <span style={{ fontWeight: 700, fontSize: 15 }}>{u.name}</span>
                  </button>
                ))}
              </div>
              <OutlineBtn onClick={() => { setPin(""); setErr(""); setStep("mgr-pin"); }}>🔐 매니저 로그인</OutlineBtn>
            </div>
          )}
          {(step === "staff-pin" || step === "mgr-pin") && (
            <div style={{ padding: "20px 24px 0", maxWidth: 320, margin: "0 auto", textAlign: "center" }}>
              <div style={{ marginBottom: 22 }}>
                <div style={{ display: "inline-flex", alignItems: "center", gap: 10, marginBottom: 8 }}>
                  <span style={{ fontSize: 28, lineHeight: 1 }}>{step === "mgr-pin" ? "👔" : C[selUser?.id]?.icon}</span>
                  <span style={{ fontSize: 22, fontWeight: 900, color: T.text }}>{step === "mgr-pin" ? "매니저" : selUser?.name}</span>
                </div>
                <p style={{ margin: 0, color: T.sub, fontSize: 14 }}>비밀번호를 입력하세요</p>
              </div>
              <div style={{ background: T.surface, borderRadius: 18, padding: "14px 16px 18px", marginBottom: 22, border: `1px solid ${T.border}` }}>
                <PinDots val={pin} />
                {err && <p style={{ margin: "8px 0 0", color: T.sun, fontSize: 15, fontWeight: 600 }}>{err}</p>}
              </div>
              <Numpad onKey={press} onDel={del} />
              <label style={{ display: "flex", alignItems: "center", justifyContent: "center", gap: 8, color: T.sub, fontSize: 14, cursor: "pointer", margin: "20px 0 16px" }}>
                <input type="checkbox" checked={remember} onChange={e => setRemember(e.target.checked)} style={{ width: 16, height: 16, accentColor: T.btn }} />
                이 기기에 로그인 유지
              </label>
              <button onClick={() => { setStep("select"); setPin(""); setErr(""); }} style={{ background: "none", border: "none", color: T.sub, fontSize: 14, cursor: "pointer", fontFamily: T.font }}>← 돌아가기</button>
            </div>
          )}
        </Screen>
      );
    }

    // ══════════════════════════════════════════════════════════
    // ██  달력 탭  ██
    // 스태프: 날짜 탭 → 근무시간 입력 (KV rec_{id} 저장)
    // 매니저: 전체 직원 근무 현황 보기 전용 (읽기 전용)
    // ══════════════════════════════════════════════════════════
    function CalTab({ session, refresh, setRefresh, onSettings }) {
      const n = new Date();
      const [view, setView] = useState({ y: n.getFullYear(), m: n.getMonth() });
      const [editing, setEditing] = useState(null);
      const [inp, setInp] = useState("");
      const [myRecs, setMyRecs] = useState({});
      const [allRecs, setAllRecs] = useState({});
      const [settings, setSettings] = useState({ wage: 10030 });
      const [loading, setLoading] = useState(false);
      const inputRef = useRef(null);

      const isStaff = session?.mode === "staff";
      const isMgr = session?.mode === "manager";
      const uid = session?.id;
      const todayK = nowKey();

      const prev = () => setView(v => v.m === 0 ? { y: v.y - 1, m: 11 } : { y: v.y, m: v.m - 1 });
      const next = () => setView(v => v.m === 11 ? { y: v.y + 1, m: 0 } : { y: v.y, m: v.m + 1 });

      // 근무 기록 로드 (뷰 변경 or refresh 시)
      useEffect(() => {
        if (!session) return;
        getSettings().then(setSettings);
        if (isStaff) {
          getRecs(uid).then(setMyRecs);
        } else if (isMgr) {
          getStaff().then(async list => {
            const r = {};
            await Promise.all(list.map(async u => {
              if (!C[u.id]) C[u.id] = { accent: "#888888", light: "#F5F5F5", icon: u.icon || "👤" };
              if (u.icon) C[u.id].icon = u.icon;
              r[u.id] = await getRecs(u.id);
            }));
            setAllRecs(r);
          });
        }
      }, [session, refresh, view.y, view.m]);

      const openCell = cell => {
        if (!isStaff) return;
        const k = dkey(cell.y, cell.m, cell.d);
        setEditing({ ...cell, key: k });
        setInp(myRecs[k] !== undefined ? String(myRecs[k]) : "");
        setTimeout(() => inputRef.current?.focus(), 80);
      };

      /** 근무시간 저장 → KV rec_{uid} 업데이트 */
      const saveH = async () => {
        const h = parseFloat(inp);
        if (isNaN(h) || h < 0 || h > 24) return;
        setLoading(true);
        const updated = { ...myRecs, [editing.key]: h };
        await saveRecs(uid, updated);
        setMyRecs(updated);
        setEditing(null); setRefresh(r => r + 1); setLoading(false);
      };

      /** 근무시간 삭제 → KV rec_{uid} 업데이트 */
      const delH = async () => {
        setLoading(true);
        const updated = { ...myRecs }; delete updated[editing.key];
        await saveRecs(uid, updated);
        setMyRecs(updated);
        setEditing(null); setRefresh(r => r + 1); setLoading(false);
      };

      if (!session) return (
        <Screen>
          <AppBar title="달력" session={session} onSettings={onSettings} />
          <div style={{ textAlign: "center", padding: "80px 20px", color: T.sub }}>
            <div style={{ fontSize: 52, marginBottom: 16 }}>📅</div>
            <p style={{ fontWeight: 700, fontSize: 16 }}>로그인 후 사용할 수 있어요</p>
          </div>
        </Screen>
      );

      const grid = buildGrid(view.y, view.m);
      const col = isStaff ? C[uid] : null;
      const monthH = isStaff
        ? Object.entries(myRecs).filter(([k]) => { const [y, mo] = k.split("-").map(Number); return y === view.y && mo - 1 === view.m; }).reduce((s, [, v]) => s + v, 0)
        : 0;

      const staffForDay = (k) => isMgr
        ? Object.entries(allRecs).filter(([, r]) => r[k] !== undefined).map(([id]) => ({ id, h: allRecs[id][k] }))
        : [];

      return (
        <Screen>
          <AppBar title="달력" session={session} onSettings={onSettings}
            right={isStaff && col && (
              <div style={{ background: col.light, borderRadius: 100, padding: "5px 16px", border: `1px solid ${col.accent}33` }}>
                <span style={{ fontSize: 15, fontWeight: 800, color: col.accent }}>{monthH.toFixed(1)}h</span>
              </div>
            )}
          />
          <MonthNav view={view} prev={prev} next={next} />
          <div style={{ display: "grid", gridTemplateColumns: "repeat(7,1fr)", padding: "0 6px", marginBottom: 3 }}>
            {WD.map((d, i) => (<div key={d} style={{ textAlign: "center", fontSize: 16, fontWeight: 700, padding: "4px 0", color: i === 5 ? T.sat : i === 6 ? T.sun : T.sub }}>{d}</div>))}
          </div>
          <div style={{ display: "grid", gridTemplateColumns: "repeat(7,1fr)", padding: "0 4px", gap: 2 }}>
            {grid.map((cell, i) => {
              const k = dkey(cell.y, cell.m, cell.d);
              const isToday = k === todayK;
              const dow = mdow(cell.y, cell.m, cell.d);
              const isSat = dow === 5, isSun = dow === 6;
              const myH = isStaff ? myRecs[k] : undefined;
              const staffsOnDay = staffForDay(k);

              return (
                <button key={i} onClick={() => openCell(cell)} style={{
                  height: 80, borderRadius: 11,
                  border: isToday ? `2px solid ${T.btn}` : `1px solid ${T.border}`,
                  background: cell.ov ? (isToday ? T.surface : "#F5F0E8") : myH !== undefined ? (col ? col.light : T.surface) : T.surface,
                  cursor: isStaff ? "pointer" : "default",
                  display: "flex", flexDirection: "column", alignItems: "center",
                  padding: "5px 1px 4px", gap: 1, fontFamily: T.font, transition: "all 0.14s", opacity: cell.ov ? 0.45 : 1, overflow: "hidden",
                }}>
                  <span style={{ fontSize: 16, fontWeight: isToday ? 900 : 600, lineHeight: 1.1, color: isSun ? T.sun : isSat ? T.sat : cell.ov ? T.muted : T.text }}>{cell.d}</span>
                  {isStaff && myH !== undefined && <span style={{ fontSize: 15, fontWeight: 800, color: col.accent, lineHeight: 1 }}>{myH}h</span>}
                  {isStaff && myH === undefined && !cell.ov && <span style={{ fontSize: 18, color: T.border, lineHeight: 1 }}>+</span>}
                  {isMgr && (
                    <div style={{ display: "flex", flexDirection: "column", gap: 1, width: "100%", padding: "0 2px" }}>
                      {staffsOnDay.slice(0, 3).map(({ id, h }) => (
                        <div key={id} style={{ background: C[id]?.light || "#f5f5f5", borderLeft: `2px solid ${C[id]?.accent || "#888"}`, borderRadius: 3, padding: "1px 2px", display: "flex", alignItems: "center", gap: 1 }}>
                          <span style={{ fontSize: 14, lineHeight: 1 }}>{C[id]?.icon || "👤"}</span>
                          <span style={{ fontSize: 14, fontWeight: 800, color: C[id]?.accent || "#888", lineHeight: 1 }}>{h}h</span>
                        </div>
                      ))}
                    </div>
                  )}
                </button>
              );
            })}
          </div>

          {/* 매니저: 월간 직원 현황 */}
          {isMgr && (
            <div style={{ padding: "16px 14px 0" }}>
              <p style={{ fontWeight: 800, fontSize: 15, marginBottom: 10, color: T.text }}>이번달 직원 현황</p>
              {Object.entries(allRecs).map(([id, r]) => {
                const col = C[id] || { accent: "#888", light: "#f5f5f5", icon: "👤" };
                const h = Object.entries(r).filter(([k]) => { const [y, mo] = k.split("-").map(Number); return y === view.y && mo - 1 === view.m; }).reduce((s, [, v]) => s + v, 0);
                const staffName = Object.values(allRecs).length > 0 ? (staffForDay("_dummy_") || []) : [];
                return (
                  <div key={id} style={{ display: "flex", alignItems: "center", justifyContent: "space-between", background: T.surface, border: `1px solid ${T.border}`, borderRadius: 16, padding: "13px 18px", marginBottom: 8 }}>
                    <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                      <div style={{ width: 38, height: 38, borderRadius: "50%", background: col.light, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 20 }}>{col.icon}</div>
                      <span style={{ fontWeight: 700, fontSize: 15 }}>ID {id}</span>
                    </div>
                    <div style={{ textAlign: "right" }}>
                      <p style={{ margin: 0, fontWeight: 800, color: col.accent, fontSize: 16 }}>{h.toFixed(1)}h</p>
                      <p style={{ margin: 0, fontSize: 14, color: T.sub }}>{comma(h * settings.wage)}원</p>
                    </div>
                  </div>
                );
              })}
            </div>
          )}

          {/* 근무시간 입력 시트 */}
          {editing && (() => {
            const hVal = parseFloat(inp) || 0;
            const addH = d => {
              const nv = Math.min(24, Math.max(0, Math.round((hVal + d) * 2) / 2));
              setInp(nv % 1 === 0 ? String(nv) : nv.toFixed(1));
            };
            const accent = col?.accent || T.btn;
            return (
              <div style={{ position: "fixed", inset: 0, background: "rgba(28,25,23,0.45)", display: "flex", alignItems: "flex-end", justifyContent: "center", zIndex: 400, backdropFilter: "blur(3px)" }} onClick={() => setEditing(null)}>
                <div style={{ background: T.surface, borderRadius: "24px 24px 0 0", padding: "22px 22px 44px", width: "100%", maxWidth: 480, boxShadow: "0 -4px 30px rgba(0,0,0,0.15)" }} onClick={e => e.stopPropagation()}>
                  <div style={{ width: 36, height: 4, background: T.border, borderRadius: 2, margin: "0 auto 18px" }} />
                  <p style={{ fontWeight: 800, fontSize: 17, margin: "0 0 3px", color: T.text }}>근무시간 입력</p>
                  <p style={{ color: T.sub, fontSize: 14, margin: "0 0 16px" }}>{editing.key.replace(/-/g, ".")}{editing.ov ? " (다른 달 날짜)" : ""}</p>
                  <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 16 }}>
                    <div style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 4 }}>
                      <button onClick={() => addH(1)} style={{ width: 44, height: 36, borderRadius: 10, border: `1px solid ${T.border}`, background: T.bg, fontSize: 18, cursor: "pointer", fontWeight: 700, color: T.text }}>▲</button>
                      <span style={{ fontSize: 11, color: T.sub, fontWeight: 700 }}>1h</span>
                      <button onClick={() => addH(-1)} style={{ width: 44, height: 36, borderRadius: 10, border: `1px solid ${T.border}`, background: T.bg, fontSize: 18, cursor: "pointer", fontWeight: 700, color: T.text }}>▼</button>
                    </div>
                    <div style={{ flex: 1 }}>
                      <input ref={inputRef} type="number" value={inp} onChange={e => setInp(e.target.value)} onKeyDown={e => e.key === "Enter" && saveH()} placeholder="0" min="0" max="24" step="0.5"
                        style={{ width: "100%", boxSizing: "border-box", background: T.bg, border: `2px solid ${accent}88`, borderRadius: 16, padding: "16px 16px", color: T.text, fontSize: 36, fontWeight: 900, fontFamily: T.font, outline: "none", textAlign: "center" }} />
                    </div>
                    <div style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 4 }}>
                      <button onClick={() => addH(0.5)} style={{ width: 44, height: 36, borderRadius: 10, border: `1px solid ${T.border}`, background: T.bg, fontSize: 18, cursor: "pointer", fontWeight: 700, color: T.text }}>▲</button>
                      <span style={{ fontSize: 11, color: T.sub, fontWeight: 700 }}>30m</span>
                      <button onClick={() => addH(-0.5)} style={{ width: 44, height: 36, borderRadius: 10, border: `1px solid ${T.border}`, background: T.bg, fontSize: 18, cursor: "pointer", fontWeight: 700, color: T.text }}>▼</button>
                    </div>
                    <span style={{ fontSize: 18, fontWeight: 700, color: T.sub, flexShrink: 0 }}>시간</span>
                  </div>
                  <div style={{ display: "flex", gap: 6, marginBottom: 18, flexWrap: "wrap" }}>
                    {[2, 3, 4, 5, 6].map(v => (
                      <button key={v} onClick={() => setInp(v % 1 === 0 ? String(v) : v.toFixed(1))} style={{ flex: 1, padding: "9px 4px", borderRadius: 100, border: `1.5px solid ${hVal === v ? accent : T.border}`, background: hVal === v ? accent : T.bg, color: hVal === v ? "#fff" : T.sub, fontWeight: 700, fontSize: 13, cursor: "pointer", fontFamily: T.font, transition: "all 0.15s", minWidth: 36 }}>{v}</button>
                    ))}
                  </div>
                  <div style={{ display: "flex", gap: 10 }}>
                    {myRecs[editing.key] !== undefined && (
                      <button onClick={delH} style={{ flex: 1, padding: "14px", borderRadius: 100, border: `1px solid ${T.sun}44`, background: "#FEF2F2", color: T.sun, fontWeight: 700, cursor: "pointer", fontFamily: T.font, fontSize: 15 }}>{loading ? "삭제 중..." : "삭제"}</button>
                    )}
                    <DarkBtn onClick={saveH}>{loading ? "저장 중..." : "저장"}</DarkBtn>
                  </div>
                </div>
              </div>
            );
          })()}
        </Screen>
      );
    }

    // ══════════════════════════════════════════════════════════
    // ██  정산 탭  ██
    // 스태프: 본인 이번달 달력 + 정산 요약 (읽기 전용)
    // 매니저: 직원 선택 → 기간 선택 → 정산 (KV settled 저장)
    // ══════════════════════════════════════════════════════════
    function SettleTab({ session, refresh, onSettings }) {
      const n = new Date();
      const [view, setView] = useState({ y: n.getFullYear(), m: n.getMonth() });
      const [settings, setSettings] = useState({ wage: 10030, bonusAmt: 10030 });
      const [wageIn, setWageIn] = useState("10030");
      const [bonusIn, setBonusIn] = useState("10030");
      const [toast, setToast] = useState("");
      const [sSaff, setSSaff] = useState(null);
      const [sMode, setSMode] = useState(null);
      const [selDates, setSelDates] = useState([]);
      const [settled, setSettled] = useState({});
      const [excludeBonus, setExcludeBonus] = useState(false);
      const [showBonusConfirm, setShowBonusConfirm] = useState(false);
      const [staffList, setStaffList] = useState([]);
      const [allRecs, setAllRecs] = useState({});
      const [myRecs, setMyRecs] = useState({});
      const [loading, setLoading] = useState(false);

      const isStaff = session?.mode === "staff";
      const isMgr = session?.mode === "manager";
      const uid = session?.id;
      const todayK = nowKey();

      // 데이터 로드 (KV)
      useEffect(() => {
        if (!session) return;
        Promise.all([getSettings(), getSettled()]).then(([s, stl]) => {
          setSettings(s); setSettled(stl);
          setWageIn(String(s.wage)); setBonusIn(String(s.bonusAmt));
        });
        if (isStaff) getRecs(uid).then(setMyRecs);
        if (isMgr) {
          getStaff().then(async list => {
            setStaffList(list);
            const r = {};
            await Promise.all(list.map(async u => {
              if (!C[u.id]) C[u.id] = { accent: "#888888", light: "#F5F5F5", icon: u.icon || "👤" };
              if (u.icon) C[u.id].icon = u.icon;
              r[u.id] = await getRecs(u.id);
            }));
            setAllRecs(r);
          });
        }
      }, [session, refresh]);

      const showToast = m => { setToast(m); setTimeout(() => setToast(""), 2200); };

      /** 시급·주휴수당 저장 → KV settings 업데이트 */
      const saveSettings = async () => {
        setLoading(true);
        const s = { wage: parseInt(wageIn) || 0, bonusAmt: parseInt(bonusIn) || 0 };
        await saveSettingsKV(s); setSettings(s);
        showToast("설정 저장됨 ✓"); setLoading(false);
      };

      const prev = () => setView(v => v.m === 0 ? { y: v.y - 1, m: 11 } : { y: v.y, m: v.m - 1 });
      const next = () => setView(v => v.m === 11 ? { y: v.y + 1, m: 0 } : { y: v.y, m: v.m + 1 });

      if (!session) return (
        <Screen>
          <AppBar title="정산" session={session} onSettings={onSettings} />
          <div style={{ textAlign: "center", padding: "80px 20px", color: T.sub }}>
            <div style={{ fontSize: 52, marginBottom: 16 }}>💰</div>
            <p style={{ fontWeight: 700, fontSize: 16 }}>로그인 후 사용할 수 있어요</p>
          </div>
        </Screen>
      );

      // ── 스태프 정산 ───────────────────────────────────────
      if (isStaff) {
        const col = C[uid];
        const grid = buildGrid(view.y, view.m);
        const mySettled = Object.keys(settled).filter(k => k.startsWith(uid + "_"));
        const monthH = Object.entries(myRecs).filter(([k]) => {
          const [y, mo] = k.split("-").map(Number); return y === view.y && mo - 1 === view.m;
        }).reduce((s, [, v]) => s + v, 0);
        const { weeks: bonusWeeks, bonus: monthBonus } = calcBonusMonth(view.y, view.m, myRecs, settings.bonusAmt || 0);
        const { carryH, lastDayKey } = getCarryover(view.y, view.m, myRecs);

        return (
          <Screen>
            <Toast msg={toast} />
            <AppBar title="내 정산" session={session} onSettings={onSettings} />
            <div style={{ padding: "14px 14px 0", display: "flex", gap: 10 }}>
              <div style={{ flex: 1, background: col.light, borderRadius: 18, border: `1px solid ${col.accent}22`, padding: "16px 14px", textAlign: "center" }}>
                <p style={{ margin: 0, fontSize: 15, color: col.accent, fontWeight: 700 }}>이번달 근무</p>
                <p style={{ margin: "6px 0 0", fontSize: 26, fontWeight: 900, color: col.accent }}>{monthH.toFixed(1)}<span style={{ fontSize: 15, marginLeft: 2 }}>h</span></p>
              </div>
              <div style={{ flex: 1, background: T.surface, borderRadius: 18, border: `1px solid ${T.border}`, padding: "16px 14px", textAlign: "center" }}>
                <p style={{ margin: 0, fontSize: 15, color: T.sub, fontWeight: 700 }}>예상 급여</p>
                <p style={{ margin: "6px 0 0", fontSize: 22, fontWeight: 900, color: T.text }}>{comma(monthH * settings.wage)}<span style={{ fontSize: 15, marginLeft: 2, fontWeight: 500 }}>원</span></p>
                {bonusWeeks > 0 && <p style={{ margin: "6px 0 0", fontSize: 12, color: "#15803D", fontWeight: 600 }}>주휴수당 ×{bonusWeeks} = +{comma(monthBonus)}원</p>}
              </div>
            </div>
            {bonusWeeks > 0 && (
              <div style={{ margin: "10px 14px 0", background: "#F0FDF4", borderRadius: 14, border: "1px solid #BBF7D0", padding: "12px 16px", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                <span style={{ fontSize: 15, fontWeight: 600, color: "#15803D" }}>주휴수당 ({bonusWeeks}주)</span>
                <span style={{ fontSize: 16, fontWeight: 800, color: "#15803D" }}>+{comma(monthBonus)}원</span>
              </div>
            )}
            {carryH > 0 && (
              <div style={{ margin: "10px 14px 0", background: "#FFF8E7", borderRadius: 14, border: "1px solid #FFD980", padding: "12px 16px", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                <div>
                  <span style={{ fontSize: 15, fontWeight: 700, color: "#B45309" }}>주휴 이월 →</span>
                  <span style={{ fontSize: 13, color: "#B45309", marginLeft: 6, fontWeight: 500 }}>다음달로 넘어가는 마지막 주</span>
                </div>
                <span style={{ fontSize: 16, fontWeight: 800, color: "#B45309" }}>{carryH.toFixed(1)}h</span>
              </div>
            )}
            <MonthNav view={view} prev={prev} next={next} />
            <div style={{ display: "grid", gridTemplateColumns: "repeat(7,1fr)", padding: "0 6px", marginBottom: 3 }}>
              {WD.map((d, i) => <div key={d} style={{ textAlign: "center", fontSize: 16, fontWeight: 700, padding: "4px 0", color: i === 5 ? T.sat : i === 6 ? T.sun : T.sub }}>{d}</div>)}
            </div>
            <div style={{ display: "grid", gridTemplateColumns: "repeat(7,1fr)", padding: "0 6px", gap: 3 }}>
              {grid.map((cell, i) => {
                const k = dkey(cell.y, cell.m, cell.d);
                const h = myRecs[k];
                const isToday = k === todayK;
                const dow = mdow(cell.y, cell.m, cell.d);
                const isSat = dow === 5, isSun = dow === 6;
                const isSettledCell = mySettled.some(sk => { const v = settled[sk]; return Array.isArray(v) ? v.includes(k) : false; });
                const isCarryCell = carryH > 0 && k === lastDayKey && !cell.ov;
                return (
                  <div key={i} style={{ height: 80, borderRadius: 13, border: isToday ? `2px solid ${T.btn}` : isCarryCell ? "2px solid #F59E0B" : `1px solid ${T.border}`, background: cell.ov ? "#F5F0E8" : isCarryCell ? "#FFF8E7" : h !== undefined ? col.light : T.surface, display: "flex", flexDirection: "column", alignItems: "center", padding: "7px 2px 5px", gap: 2, opacity: cell.ov ? 0.4 : 1 }}>
                    <span style={{ fontSize: 16, fontWeight: isToday ? 900 : 600, color: isSun ? T.sun : isSat ? T.sat : cell.ov ? T.muted : T.text }}>{cell.d}</span>
                    {h !== undefined && <span style={{ fontSize: 15, fontWeight: 800, color: col.accent }}>{h}h</span>}
                    {isSettledCell && <span style={{ fontSize: 11, background: "#15803D", color: "#fff", borderRadius: 4, padding: "1px 4px", fontWeight: 700 }}>✓정산</span>}
                    {isCarryCell && <span style={{ fontSize: 10, background: "#F59E0B", color: "#fff", borderRadius: 4, padding: "1px 3px", fontWeight: 700, lineHeight: 1.2 }}>이월 {carryH.toFixed(1)}h</span>}
                  </div>
                );
              })}
            </div>
          </Screen>
        );
      }

      // ── 매니저 정산 ───────────────────────────────────────
      const grid = buildGrid(view.y, view.m);
      const allDayKeys = Array.from({ length: daysIn(view.y, view.m) }, (_, i) => dkey(view.y, view.m, i + 1));
      const mgrCarry = sSaff ? getCarryover(view.y, view.m, allRecs[sSaff] || {}) : { carryH: 0, lastDayKey: null };

      const clickDay = k => {
        if (!sSaff || !sMode) return;
        if (sMode === "week") {
          const [y, mo, d] = k.split("-").map(Number);
          if (mdow(y, mo - 1, d) !== 0) return;
          const dates = [];
          for (let i = 0; i < 7; i++) { const dd = new Date(y, mo - 1, d + i); dates.push(dkey(dd.getFullYear(), dd.getMonth(), dd.getDate())); }
          if (selDates.length > 0 && selDates[0] === dates[0]) setSelDates([]); else setSelDates(dates);
        } else if (sMode === "month") {
          const [y, mo, d] = k.split("-").map(Number);
          if (d !== 1) return;
          const firstKey = dkey(y, mo - 1, 1);
          if (selDates.length > 0 && selDates[0] === firstKey) { setSelDates([]); return; }
          const dates = []; const dim = daysIn(y, mo - 1);
          for (let i = 1; i <= dim; i++) dates.push(dkey(y, mo - 1, i));
          setSelDates(dates);
        } else {
          if (selDates.length === 0) { setSelDates([k]); }
          else if (selDates.length === 1) {
            if (selDates[0] === k) { setSelDates([]); return; }
            const ai = allDayKeys.indexOf(selDates[0]), bi = allDayKeys.indexOf(k);
            if (ai < 0 || bi < 0) { setSelDates([k]); return; }
            const [a, b] = ai <= bi ? [ai, bi] : [bi, ai];
            setSelDates(allDayKeys.slice(a, b + 1));
          } else { setSelDates([k]); }
        }
      };

      const settleKeyStr = sSaff && selDates.length > 0 ? `${sSaff}_${[...selDates].sort()[0]}` : null;
      const isAlreadySettled = settleKeyStr ? Array.isArray(settled[settleKeyStr]) : false;
      const sCol = sSaff ? (C[sSaff] || { accent: "#888", light: "#f5f5f5", icon: "👤" }) : null;
      const sUser = sSaff ? staffList.find(u => u.id === sSaff) : null;

      const calcResult = () => {
        if (!sSaff || selDates.length === 0) return null;
        const r = allRecs[sSaff] || {};
